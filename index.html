<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Master - Eduardo Goulart</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --primary: #5487e3;
            --accent: #f1c40f;
            --danger: #ff6b6b;
            --success: #2ecc71;
            --winner-glow: #2ecc71;
        }

        body { 
            font-family: 'Arial Rounded MT Bold', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        /* Menu Inicial */
        #setup-menu { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
            text-align: center; 
            border-top: 10px solid var(--primary); 
            width: 90%; 
            max-width: 500px; 
        }

        .input-group { margin: 15px 0; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #ccc; width: 100%; max-width: 250px; text-align: center; font-size: 18px; }
        
        .info-text { 
            font-size: 0.85rem; color: #666; background: #f8f9fa; 
            padding: 15px; border-radius: 10px; border-left: 5px solid var(--accent); 
            text-align: left; margin-top: 15px; line-height: 1.4;
        }

        /* Placar */
        .score-board { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 25px; width: 100%; }
        .team-card { 
            background: white; padding: 12px; border-radius: 15px; border: 4px solid #ddd; 
            min-width: 100px; text-align: center; transition: all 0.4s ease; position: relative;
        }
        .team-card.winning { border-color: var(--winner-glow); box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); transform: translateY(-5px); }
        .team-card.winning::after { content: "🏆"; position: absolute; top: -15px; right: -5px; font-size: 24px; }
        .team-card.active { background: #fffbe6; border-style: dashed; border-color: var(--accent); }
        .group-name { font-size: 0.8rem; color: #666; font-weight: bold; text-transform: uppercase; }
        .group-score { font-size: 2rem; font-weight: bold; color: #333; }

        /* Grade Dinâmica (Cards Grandes) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            width: 100%; 
            padding: 10px;
            box-sizing: border-box;
        }

        .card { 
            aspect-ratio: 4/3; 
            background: var(--primary); 
            color: white; 
            border-radius: 18px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: clamp(2.5rem, 6vw, 4rem); 
            cursor: pointer; 
            transition: transform 0.2s, background 0.2s; 
            box-shadow: 0 8px 0 #3d6dbd; 
            font-weight: bold;
        }
        .card:hover:not(.used) { transform: translateY(-5px); background: #3d6dbd; }
        .card.used { background: #bdc3c7; box-shadow: 0 8px 0 #95a5a6; cursor: not-allowed; opacity: 0.5; transform: none; }

        /* Modal da Pergunta */
        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index:100; justify-content: center; align-items: center; }
        #modal { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 650px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .opt-btn { padding: 20px; border: 3px solid var(--primary); border-radius: 15px; cursor: pointer; background: white; font-weight: bold; font-size: 1.2rem; transition: 0.2s; }
        .opt-btn.correct { background: var(--success) !important; color: white; border-color: #27ae60; }
        .opt-btn.wrong { background: var(--danger) !important; color: white; border-color: #c0392b; }

        .action-btn { padding: 15px 40px; border: none; border-radius: 12px; cursor: pointer; background: var(--primary); color: white; font-weight: bold; font-size: 1.2rem; box-shadow: 0 4px 0 #3d6dbd; }
        .action-btn:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: var(--primary); margin: 0;">🎮 Português</h1>
    <p style="margin: 5px 0 20px 0; font-size: 1.2rem; color: #555;">Prof. Eduardo Goulart</p>
    
    <div class="input-group">
        <label>Quantidade de Grupos:</label>
        <input type="number" id="teamCount" value="2" min="1" max="10">
    </div>
    <div class="input-group">
        <label>Quantidade de Cartões:</label>
        <input type="number" id="cardCount" value="16" min="1" max="100">
    </div>
    <div class="input-group">
        <label><b>Arquivo de Perguntas (CSV):</b></label>
        <input type="file" id="csvFile" accept=".csv">
        <div class="info-text">
            <b>Dica Certo/Errado:</b> Para apenas 2 opções, deixe as colunas C e D vazias no seu arquivo CSV.<br>
            <i>Ex: Pergunta, Certo, Errado, , , A, 10</i>
        </div>
    </div>
    <button class="action-btn" onclick="startGame()">INICIAR JOGO</button>
</div>

<div id="game-area" style="display:none; width: 100%;">
    <div class="score-board" id="score-board"></div>
    <div class="grid" id="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <div id="m-points" style="font-weight:bold; color: var(--accent); font-size: 1.5rem;">10 pts</div>
        <h2 id="m-question" style="margin: 20px 0; font-size: 1.8rem;">Pergunta?</h2>
        <div class="options-grid" id="m-options"></div>
        <div style="font-size: 1.1rem; border-top: 1px solid #eee; padding-top: 15px;">
            Vez do: <strong id="current-group-display" style="color: var(--primary)">Grupo 1</strong>
        </div>
    </div>
</div>

<script>
    let questions = [];
    let teams = [];
    let currentTeamIdx = 0;

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            questions = event.target.result.split('\n').filter(l => l.trim() !== '').map(l => l.split(','));
        };
        reader.readAsText(e.target.files[0]);
    });

    function startGame() {
        const nTeams = parseInt(document.getElementById('teamCount').value);
        const nCards = parseInt(document.getElementById('cardCount').value);
        
        if (questions.length === 0) {
            for(let i=0; i<nCards; i++) questions.push([`Questão de Teste ${i+1}`, "Opção A", "Opção B", "", "", "A", "10"]);
        }

        teams = Array.from({length: nTeams}, (_, i) => ({ name: `Grupo ${i+1}`, score: 0 }));
        renderScores();

        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < nCards; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = i + 1;
            card.onclick = () => openQuestion(i, card);
            grid.appendChild(card);
        }
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
    }

    function renderScores() {
        const board = document.getElementById('score-board');
        board.innerHTML = '';
        const max = Math.max(...teams.map(t => t.score));
        teams.forEach((t, i) => {
            const win = t.score === max && max > 0;
            const div = document.createElement('div');
            div.className = `team-card ${i === currentTeamIdx ? 'active' : ''} ${win ? 'winning' : ''}`;
            div.innerHTML = `<div class="group-name">${t.name}</div><div class="group-score">${t.score}</div>`;
            board.appendChild(div);
        });
    }

    function openQuestion(idx, card) {
        if (card.classList.contains('used')) return;
        const q = questions[idx % questions.length];
        document.getElementById('m-question').innerText = q[0];
        document.getElementById('m-points').innerText = `${q[6] || 10} PONTOS`;
        document.getElementById('current-group-display').innerText = teams[currentTeamIdx].name;
        
        const opts = document.getElementById('m-options');
        opts.innerHTML = '';
        
        ['A','B','C','D'].forEach((l, i) => {
            const txt = q[i+1] ? q[i+1].trim() : "";
            if (txt && txt !== "" && txt !== "-") {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = `${l}: ${txt}`;
                btn.onclick = () => {
                    const btns = document.querySelectorAll('.opt-btn');
                    btns.forEach(b => b.style.pointerEvents = 'none');
                    if (l === q[5].trim()) { 
                        btn.classList.add('correct'); 
                        teams[currentTeamIdx].score += parseInt(q[6]||10); 
                    } else { 
                        btn.classList.add('wrong'); 
                        btns.forEach(b => { if(b.innerText.startsWith(q[5].trim())) b.classList.add('correct'); }); 
                    }
                    card.classList.add('used');
                    renderScores();
                    setTimeout(() => { 
                        document.getElementById('modal-overlay').style.display = 'none'; 
                        currentTeamIdx = (currentTeamIdx+1)%teams.length; 
                        renderScores(); 
                    }, 2500);
                };
                opts.appendChild(btn);
            }
        });
        document.getElementById('modal-overlay').style.display = 'flex';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eduardo Goulart</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --primary: #5487e3; --accent: #f1c40f; --danger: #ff6b6b;
            --success: #2ecc71; --joker: #9b59b6; --text: #333; --card-bg: white; --border: #ccc;
        }
        body.dark-mode { --bg: #121212; --text: #f0f0f0; --card-bg: #1e1e1e; --border: #333; }
        html, body { overscroll-behavior-y: none; } 
        body { font-family: 'Arial Rounded MT Bold', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: 0.3s; }

        #setup-menu { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; border-top: 10px solid var(--primary); width: 90%; max-width: 600px; }
        .input-group { margin: 12px 0; display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; position: relative; }
        label { font-weight: bold; font-size: 0.9rem; }
        input[type="number"], input[type="range"], select, textarea, input[type="text"] { width: 100%; max-width: 350px; padding: 12px; border-radius: 8px; border: 2px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 18px; text-align: center; }
        
        #global-timer-display { background: var(--danger); color: white; padding: 5px 15px; border-radius: 20px; font-size: 1.2rem; font-weight: bold; min-width: 100px; text-align: center; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; padding: 20px; }
        .grid.tictactoe { grid-template-columns: repeat(3, 1fr) !important; max-width: 500px; }
        
        .card { aspect-ratio: 4/3; background: var(--primary); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 0 #3d6dbd; font-weight: bold; border: 4px solid transparent; }
        .card.used-correct { background: var(--card-bg) !important; color: var(--text) !important; border: 4px solid var(--success) !important; box-shadow: none; }
        .card.used-wrong { background: var(--danger) !important; color: white !important; box-shadow: none; }

        .team-card { background: var(--card-bg); padding: 10px; border-radius: 10px; border: 3px solid var(--border); min-width: 100px; text-align: center; }
        .team-card.active { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        #modal { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 100%; max-width: 700px; text-align: center; max-height: 90vh; overflow-y: auto; position: relative; }
        
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 35px; font-weight: bold; cursor: pointer; display: none; transition: 0.3s; }
        #modal.stop-mode .close-modal { display: block; color: var(--danger); }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .opt-btn { padding: 15px; border: 2px solid var(--primary); border-radius: 10px; background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1.1rem; }
        .opt-btn.correct { background-color: var(--success) !important; color: white !important; }
        .opt-btn.wrong { background-color: var(--danger) !important; color: white !important; }

        #exp-box { margin-top: 15px; padding: 12px; border-radius: 8px; background: #e8f4fd; color: #2c3e50; border-left: 5px solid var(--primary); text-align: left; display: none; font-size: 0.9rem; }
        .action-btn { padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.3s; }
        
        .report-item { margin-bottom: 12px; padding: 10px; border-radius: 8px; font-size: 0.85rem; border-left: 4px solid #ccc; background: rgba(0,0,0,0.03); text-align: left; }
        .report-item.correct-row { border-left-color: var(--success); }
        .report-item.wrong-row { border-left-color: var(--danger); }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: var(--primary); margin: 0;">🎮 Português 🎮</h1>
    <p style="margin: 5px 0 15px 0; font-weight: bold;">Prof: Eduardo Goulart</p>

    <div class="input-group">
        <label>1. Colar Questões (JSON):</label>
        <textarea id="jsonInput" placeholder="Cole o código das questões aqui..." style="height: 60px;"></textarea>
    </div>

    <div class="input-group">
        <label>2. Nomes dos Grupos (Separados por vírgula):</label>
        <textarea id="teamNamesInput" placeholder="Ex: Panteras, Águias, Tubarões..." style="height: 45px; font-size: 14px;"></textarea>
    </div>

    <div class="input-group">
        <label>Modo de Jogo:</label>
        <select id="gameModeSel" onchange="handleModeChange()">
            <option value="classic">Modo Padrão (Grid)</option>
            <option value="tictactoe">Jogo da Velha (3x3)</option>
            <option value="stop">Stop Digital (Agilidade)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Tempo de Aula (MM:SS):</label>
        <input type="text" id="timeInput" placeholder="00:00" maxlength="5" onkeyup="formatTimeInput(this)" value="30:00">
    </div>

    <div id="extra-configs">
        <div class="input-group">
            <label id="jokerLabel">Probabilidade Surpresa: <b id="jokerVal">15%</b></label>
            <input type="range" id="jokerProb" min="0" max="50" value="15" oninput="document.getElementById('jokerVal').innerText = this.value + '%'">
        </div>
        <div class="input-group">
            <label id="lblTeam">Quantidade de Grupos:</label>
            <input type="number" id="teamCount" value="4">
        </div>
        <div class="input-group">
            <label>Total de Cartões:</label>
            <input type="number" id="cardCount" value="15">
        </div>
        <div class="config-box">
            <label><input type="checkbox" id="reboundCb" checked> 🏀 Ativar Rebote</label>
        </div>
    </div>

    <button class="action-btn" onclick="startGame()" style="width:100%; background:var(--success); color:white;">INICIAR</button>
</div>

<div id="game-area" style="display:none; width: 100%;">
    <div class="top-controls" style="display: flex; justify-content: space-between; width: 95%; align-items: center; margin-bottom: 20px;">
        <button onclick="toggleDarkMode()" style="font-size: 24px; background: none; border: none; cursor: pointer;">🌙</button>
        <div id="global-timer-display">00:00</div>
        <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:10px 20px; border-radius:10px; font-weight: bold; cursor: pointer;">SAIR</button>
    </div>
    <div id="score-board" style="display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center;"></div>
    <div id="grid" class="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <span class="close-modal" onclick="handleXClick()">&times;</span>
        <div id="rebote-msg" style="color:var(--joker); font-weight:bold; margin-bottom:10px; display:none;">🏀 REBOTE!</div>
        <div id="modal-content"></div>
        <div id="exp-box"></div>
        <div id="modal-actions" style="margin-top:20px; display:flex; gap:10px; flex-direction:column;">
            <button id="btn-rebound" class="action-btn" style="display:none; width:100%; background:var(--joker); color:white;">🏀 PASSAR PARA REBOTE</button>
            <button id="btn-continue" class="action-btn" style="display:none; width:100%; background:var(--primary); color:white;" onclick="closeModal()">PRÓXIMA QUESTÃO</button>
        </div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let globalTimerInterval, totalSecondsLeft, questions = [], teams = [], currentTeamIdx = 0, cardStates = {}, nCardsGlob = 15;
    let gameMode = 'classic', isReboundActive = false, originalTurnIdx = 0, currentStopIdx = 0;
    let quizReport = [], tttBoard = Array(9).fill(null);

    function formatTimeInput(input) {
        let value = input.value.replace(/\D/g, "");
        if (value.length > 2) value = value.substring(0, 2) + ":" + value.substring(2, 4);
        input.value = value;
    }

    function handleXClick() {
        if (gameMode === 'stop') {
            if (confirm("Deseja encerrar o jogo agora e ver os resultados?")) showFinal();
            else closeModal();
        }
    }

    function handleModeChange() {
        const mode = document.getElementById('gameModeSel').value;
        const extras = document.getElementById('extra-configs');
        const teamInp = document.getElementById('teamCount');
        const jokerVal = document.getElementById('jokerVal');

        if(mode === 'tictactoe') {
            extras.style.display = 'block';
            teamInp.value = 2; teamInp.disabled = true;
            document.getElementById('jokerProb').value = 0;
            jokerVal.innerText = "0%";
        } else if (mode === 'stop') {
            extras.style.display = 'none';
        } else {
            extras.style.display = 'block';
            teamInp.disabled = false;
        }
    }

    function startGame() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const jsonText = document.getElementById('jsonInput').value;
        gameMode = document.getElementById('gameModeSel').value;
        if(jsonText.trim() === "") { alert("Cole o JSON!"); return; }
        try { questions = JSON.parse(jsonText).map(i => ({...i, pts: parseInt(i.pts) || 10})); } catch(e) { alert("Erro JSON!"); return; }

        const timeParts = document.getElementById('timeInput').value.split(":");
        totalSecondsLeft = (parseInt(timeParts[0]) * 60) + (parseInt(timeParts[1]) || 0);

        // LÓGICA DE NOMES DOS GRUPOS
        const nTeams = (gameMode === 'stop') ? 4 : parseInt(document.getElementById('teamCount').value);
        const customNames = document.getElementById('teamNamesInput').value.split(',').map(n => n.trim()).filter(n => n !== "");
        
        teams = [];
        for(let i=0; i<nTeams; i++) {
            let name = customNames[i] ? customNames[i] : `Grupo ${i+1}`;
            teams.push({name: name, score: 0, color: `hsl(${(i*137)%360}, 70%, 50%)`});
        }

        startGlobalTimer();
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';

        if(gameMode === 'stop') {
            document.getElementById('grid').style.display = 'none';
            loadStopQuestion();
        } else {
            renderBoard();
        }
    }

    function startGlobalTimer() {
        globalTimerInterval = setInterval(() => {
            totalSecondsLeft--;
            let m = Math.floor(totalSecondsLeft / 60), s = totalSecondsLeft % 60;
            document.getElementById('global-timer-display').innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            if(totalSecondsLeft <= 0) showFinal();
        }, 1000);
    }

    function renderBoard() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        grid.className = 'grid ' + (gameMode === 'tictactoe' ? 'tictactoe' : '');
        const total = gameMode === 'tictactoe' ? 9 : questions.length;
        for(let i=0; i<total; i++) {
            const card = document.createElement('div'), st = cardStates[i];
            card.className = 'card' + (st ? (st.correct ? ' used-correct' : ' used-wrong') : '');
            card.innerHTML = st ? (st.mark || '') : (i + 1);
            card.onclick = () => { if(!cardStates[i]) { originalTurnIdx = currentTeamIdx; showQuestion(i); } };
            grid.appendChild(card);
        }
        renderScores();
    }

    function loadStopQuestion() {
        if(currentStopIdx >= questions.length) { showFinal(); return; }
        showQuestion(currentStopIdx);
    }

    function showQuestion(idx) {
        const q = questions[idx % questions.length];
        const modal = document.getElementById('modal');
        const content = document.getElementById('modal-content');
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'none';
        document.getElementById('btn-rebound').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';

        if (gameMode === 'stop') modal.classList.add('stop-mode');
        else modal.classList.remove('stop-mode');
        
        const isVF = !q.c || q.c.trim() === "";
        content.innerHTML = `<h2>${q.q}</h2><div class="options-grid">
            <button class="opt-btn" onclick="checkAns(this, 'A', '${q.correct}', ${idx})">A: ${q.a}</button>
            <button class="opt-btn" onclick="checkAns(this, 'B', '${q.correct}', ${idx})">B: ${q.b}</button>
            ${!isVF ? `<button class="opt-btn" onclick="checkAns(this, 'C', '${q.correct}', ${idx})">C: ${q.c}</button>` : ''}
            ${!isVF ? `<button class="opt-btn" onclick="checkAns(this, 'D', '${q.correct}', ${idx})">D: ${q.d}</button>` : ''}
        </div><p>Vez de: <b>${teams[currentTeamIdx].name}</b></p>`;
    }

    function checkAns(btn, chosen, correct, idx) {
        const q = questions[idx % questions.length];
        const isCorrect = chosen === correct.trim();
        const allBtns = document.querySelectorAll('.opt-btn');

        if(isCorrect) {
            btn.classList.add('correct');
            let gain = isReboundActive ? Math.floor(q.pts / 2) : q.pts;
            teams[currentTeamIdx].score += gain;
            cardStates[idx] = {correct: true, mark: gameMode==='tictactoe'?(currentTeamIdx===0?'X':'O'):'✅'};
            if(gameMode === 'tictactoe') tttBoard[idx] = currentTeamIdx;
            quizReport.push({q: q.q, correct: true, ans: chosen, expected: correct, team: teams[currentTeamIdx].name});
        } else {
            btn.classList.add('wrong');
            if(gameMode !== 'stop' && document.getElementById('reboundCb').checked && q.c && q.c !== "" && !isReboundActive) {
                isReboundActive = true;
                const rebBtn = document.getElementById('btn-rebound'); rebBtn.style.display = 'block';
                allBtns.forEach(b => b.disabled = true);
                rebBtn.onclick = () => {
                    currentTeamIdx = (currentTeamIdx + 1) % teams.length;
                    renderScores();
                    allBtns.forEach(b => { if(!b.classList.contains('wrong')) b.disabled = false; });
                    rebBtn.style.display = 'none';
                };
                return;
            } else {
                if(gameMode !== 'tictactoe') cardStates[idx] = {correct: false, mark: '❌'};
                quizReport.push({q: q.q, correct: false, ans: chosen, expected: correct, team: teams[currentTeamIdx].name});
            }
        }
        document.getElementById('exp-box').innerHTML = `<b>Resposta: ${q.correct}</b><br>${q.exp || ""}`;
        document.getElementById('exp-box').style.display = 'block';
        document.getElementById('btn-continue').style.display = 'block';
        allBtns.forEach(b => b.disabled = true);
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        if(gameMode === 'stop') { currentStopIdx++; currentTeamIdx = (currentTeamIdx + 1) % teams.length; loadStopQuestion(); return; }
        currentTeamIdx = (originalTurnIdx + 1) % teams.length;
        isReboundActive = false;
        if(gameMode === 'tictactoe') {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let w of wins) if(tttBoard[w[0]]!==null && tttBoard[w[0]]===tttBoard[w[1]] && tttBoard[w[0]]===tttBoard[w[2]]) return showFinal();
        }
        if(Object.keys(cardStates).length === (gameMode==='tictactoe'?9:questions.length)) return showFinal();
        renderBoard();
    }

    function renderScores() {
        document.getElementById('score-board').innerHTML = teams.map((t, i) => `<div class="team-card ${i===currentTeamIdx?'active':''}" style="border-color:${t.color}"><b>${t.name}</b><br>${t.score}</div>`).join('');
    }

    function showFinal() {
        clearInterval(globalTimerInterval);
        const sorted = [...teams].sort((a,b) => b.score - a.score);
        confetti({ particleCount: 200, spread: 70 });
        let h = `<h1>🏆 RESULTADO</h1><div style="background:#eee; padding:15px; border-radius:10px;">`;
        sorted.forEach((t, i) => h += `<p><b>${i+1}º ${t.name}</b>: ${t.score} pts</p>`);
        h += `</div><div style="text-align:left; margin-top:20px;"><h3>📝 Revisão:</h3>`;
        quizReport.forEach(r => h += `<div class="report-item ${r.correct?'correct-row':'wrong-row'}">${r.correct?'✅':'❌'} ${r.q}<br><small>Gabarito: ${r.expected} | Time: ${r.team}</small></div>`);
        h += `</div><button class='action-btn' style='background:var(--danger); color:white; margin-top:20px;' onclick='location.reload()'>REINICIAR</button>`;
        document.getElementById('modal-content').innerHTML = h;
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('btn-continue').style.display = 'none';
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('modal').classList.remove('stop-mode');
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function checkJSONAuto() {}
</script>
</body>
</html>

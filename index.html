<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eduardo Goulart - Quiz Master PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --primary: #5487e3; --accent: #f1c40f; --danger: #ff6b6b;
            --success: #2ecc71; --joker: #9b59b6; --text: #333; --card-bg: white; --border: #ccc;
        }
        body.dark-mode { --bg: #121212; --text: #f0f0f0; --card-bg: #1e1e1e; --border: #444; }
        
        html, body { 
            overscroll-behavior-y: none; 
            height: 100vh; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        } 
        
        body { 
            font-family: 'Arial Rounded MT Bold', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: 0.3s; 
        }

        /* --- SETUP MENU --- */
        #setup-menu { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            margin: 20px; 
            border-top: 10px solid var(--primary); 
            width: 90%; 
            max-width: 650px; 
            text-align: center;
        }
        .input-group { margin: 12px 0; display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; position: relative; }
        input, select, textarea { width: 100%; max-width: 350px; padding: 12px; border-radius: 8px; border: 2px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 16px; text-align: center; }
        
        .code-block { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 8px; text-align: left; font-family: monospace; font-size: 0.8rem; overflow-x: auto; width: 100%; cursor: pointer; margin-top: 10px; }

        /* --- GAME AREA (PROJETOR MODE) --- */
        #game-area { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
            flex-direction: column; 
            padding: 15px; 
            box-sizing: border-box; 
        }

        .top-controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            margin-bottom: 10px; 
        }

        #global-timer-display { 
            background: var(--danger); 
            color: white; 
            padding: 8px 30px; 
            border-radius: 50px; 
            font-size: 2.5rem; 
            font-weight: bold; 
        }

        #score-board { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .team-card { 
            background: var(--card-bg); 
            padding: 10px 20px; 
            border-radius: 15px; 
            border: 5px solid var(--border); 
            min-width: 160px; 
            text-align: center; 
            font-size: 1.6rem;
            transition: 0.3s;
        }
        .team-card.active { 
            border-color: var(--accent); 
            transform: scale(1.1); 
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
        }

        /* --- GRID GIGANTE --- */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 20px; 
            width: 100%; 
            flex-grow: 1; 
            align-content: center;
        }
        #grid.tictactoe { 
            grid-template-columns: repeat(3, 1fr) !important; 
            max-width: 80vh; 
            margin: 0 auto; 
        }

        .card { 
            aspect-ratio: 1/1; 
            background: var(--primary); 
            color: white; 
            border-radius: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 5.5rem; /* Letras/Números enormes para projetor */
            cursor: pointer; 
            transition: 0.2s; 
            box-shadow: 0 10px 0 #3d6dbd; 
            font-weight: 900; 
            border: 4px solid rgba(255,255,255,0.2);
        }
        .card:hover { transform: scale(1.02); }
        .card:active { transform: translateY(5px); box-shadow: 0 4px 0 #3d6dbd; }

        .card.used-correct { background: var(--card-bg) !important; color: var(--success) !important; border: 10px solid var(--success) !important; box-shadow: none; font-size: 6rem; }
        .card.used-wrong { background: var(--danger) !important; color: white !important; box-shadow: none; font-size: 5rem; }

        /* --- MODAL DE PERGUNTAS AMPLIADO --- */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        #modal { background: var(--card-bg); padding: 40px; border-radius: 30px; width: 95%; max-width: 1100px; text-align: center; max-height: 95vh; overflow-y: auto; position: relative; }
        
        .close-modal { position: absolute; top: 10px; right: 10px; font-size: 40px; cursor: pointer; color: var(--danger); font-weight: bold; }
        
        #modal-content h2 { font-size: 3rem; margin-bottom: 30px; line-height: 1.1; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .opt-btn { padding: 30px; border: 4px solid var(--primary); border-radius: 20px; background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: bold; font-size: 2rem; transition: 0.2s; }
        .opt-btn:hover { background: #f8f9fa; }
        .opt-btn.correct { background-color: var(--success) !important; color: white !important; border-color: #1e8449; }
        .opt-btn.wrong { background-color: var(--danger) !important; color: white !important; border-color: #c0392b; }

        #exp-box { padding: 20px; border-radius: 15px; background: #e8f4fd; color: #2c3e50; border-left: 10px solid var(--primary); text-align: left; font-size: 1.5rem; margin-top: 20px; display: none; }
        
        .action-btn { padding: 20px 40px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 1.8rem; transition: 0.3s; width: 100%; }
        
        .modal-gif { max-width: 100%; max-height: 300px; border-radius: 15px; margin-bottom: 15px; }

        /* Relatório Final */
        .podium-container { display: flex; align-items: flex-end; justify-content: center; gap: 15px; margin: 40px 0; height: 250px; }
        .podium-step { width: 150px; text-align: center; border-radius: 15px 15px 0 0; font-weight: bold; position: relative; padding-top: 20px; }
        .podium-1 { height: 100%; background: #f1c40f; font-size: 1.8rem; }
        .podium-2 { height: 70%; background: #bdc3c7; font-size: 1.5rem; }
        .podium-3 { height: 50%; background: #cd7f32; font-size: 1.3rem; color: white; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: var(--primary); font-size: 2.5rem; margin: 0;">🎮 Quiz Master PRO 🎮</h1>
    <p style="font-weight: bold; font-size: 1.2rem;">Professor Eduardo Goulart</p>

    <div class="input-group" style="background: rgba(155, 89, 182, 0.1); padding: 20px; border-radius: 15px; border: 2px dashed var(--joker);">
        <label style="color: var(--joker); font-weight: bold;">🔮 Gerador de Questões IA</label>
        <input type="text" id="themeInput" placeholder="Tema (Ex: Crase)">
        <input type="number" id="qtdInput" value="15">
        <select id="modelSel">
            <option value="openrouter/free">Auto IA Grátis</option>
            <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
            <option value="gpt-4o-mini">GPT-4o Mini</option>
        </select>
        <input type="password" id="apiKeyInput" placeholder="Sua Chave API">
        <button onclick="generateWithAPI()" id="btn-gerar-ia" style="background:var(--joker); color:white; padding:15px; border:none; border-radius:10px; width:100%; cursor:pointer; font-weight:bold; margin-top:10px;">⚡ GERAR COM IA</button>
    </div>

    <div class="input-group">
        <label>Colar JSON:</label>
        <textarea id="jsonInput" style="height: 60px;"></textarea>
    </div>

    <div class="input-group">
        <label>Nomes dos Grupos (separados por vírgula):</label>
        <input type="text" id="teamNamesInput" placeholder="Grupo A, Grupo B...">
    </div>

    <div class="input-group">
        <label>Modo:</label>
        <select id="gameModeSel">
            <option value="classic">Modo Padrão (Grid)</option>
            <option value="tictactoe">Jogo da Velha</option>
            <option value="stop">Sequência (Linear)</option>
        </select>
    </div>

    <button class="action-btn" onclick="startGame()" style="background:var(--success); color:white; margin-top:20px;">INICIAR JOGO</button>
</div>

<div id="game-area">
    <div class="top-controls">
        <button onclick="document.body.classList.toggle('dark-mode')" style="font-size: 2rem; background:none; border:none; cursor:pointer;">🌙</button>
        <div id="global-timer-display">30:00</div>
        <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:10px 20px; border-radius:10px; font-weight:bold; cursor:pointer;">SAIR</button>
    </div>
    <div id="score-board"></div>
    <div id="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modal-content"></div>
        <div id="exp-box"></div>
        <div id="modal-actions" style="margin-top:30px; display:flex; flex-direction:column; gap:15px;">
            <button id="btn-rebound" class="action-btn" style="display:none; background:var(--joker); color:white;">🏀 REBOTE</button>
            <button id="btn-continue" class="action-btn" style="display:none; background:var(--primary); color:white;" onclick="closeModal()">PRÓXIMA PERGUNTA</button>
        </div>
    </div>
</div>

<script>
    let globalTimerInterval, totalSecondsLeft, questions = [], teams = [], currentTeamIdx = 0, cardStates = {}, gameMode = 'classic', isReboundActive = false, originalTurnIdx = 0;
    const gifList = Array.from({length: 38}, (_, i) => `gif/${i+1}.gif`);
    let availableGifs = [];

    function getNextGif() {
        if (availableGifs.length === 0) availableGifs = [...gifList].sort(() => Math.random() - 0.5);
        return availableGifs.pop();
    }

    async function generateWithAPI() {
        const theme = document.getElementById('themeInput').value;
        const apiKey = document.getElementById('apiKeyInput').value;
        const btn = document.getElementById('btn-gerar-ia');
        if(!theme || !apiKey) return alert("Tema e API Key são obrigatórios!");
        
        btn.innerText = "⏳ GERANDO..."; btn.disabled = true;
        const prompt = `Atue como professor de Português. Gere ${document.getElementById('qtdInput').value} questões sobre ${theme} em JSON puro: [{"q":"?","a":"","b":"","c":"","d":"","correct":"A","pts":10,"exp":""}]`;

        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                body: JSON.stringify({ model: document.getElementById('modelSel').value, messages: [{role: "user", content: prompt}] })
            });
            const data = await res.json();
            let text = data.choices[0].message.content.replace(/```json|```/g, "").trim();
            document.getElementById('jsonInput').value = text;
            alert("✅ Sucesso!");
        } catch (e) { alert("Erro: " + e.message); }
        btn.innerText = "⚡ GERAR COM IA"; btn.disabled = false;
    }

    function startGame() {
        try { questions = JSON.parse(document.getElementById('jsonInput').value); } catch(e) { return alert("Erro no JSON!"); }
        gameMode = document.getElementById('gameModeSel').value;
        
        let names = document.getElementById('teamNamesInput').value.split(',').map(n => n.trim()).filter(n => n);
        if(names.length === 0) names = ["Grupo 1", "Grupo 2"];
        teams = names.map(name => ({ name, score: 0, color: '#5487e3' }));

        totalSecondsLeft = 1800;
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
        
        startTimer();
        renderBoard();
    }

    function startTimer() {
        globalTimerInterval = setInterval(() => {
            totalSecondsLeft--;
            let m = Math.floor(totalSecondsLeft / 60), s = totalSecondsLeft % 60;
            document.getElementById('global-timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(totalSecondsLeft <= 0) showFinal();
        }, 1000);
    }

    function renderBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        grid.className = (gameMode === 'tictactoe') ? 'tictactoe' : '';
        
        const total = gameMode === 'tictactoe' ? 9 : questions.length;
        for(let i=0; i<total; i++) {
            const card = document.createElement('div');
            const st = cardStates[i];
            card.className = 'card' + (st ? (st.correct ? ' used-correct' : ' used-wrong') : '');
            card.innerHTML = st ? (st.mark || '') : (i + 1);
            card.onclick = () => { if(!cardStates[i]) { originalTurnIdx = currentTeamIdx; showQuestion(i); } };
            grid.appendChild(card);
        }
        renderScores();
    }

    function renderScores() {
        document.getElementById('score-board').innerHTML = teams.map((t, i) => 
            `<div class="team-card ${i===currentTeamIdx?'active':''}"><b>${t.name}</b><br>${t.score} pts</div>`
        ).join('');
    }

    function showQuestion(idx) {
        const q = questions[idx % questions.length];
        const modalContent = document.getElementById('modal-content');
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';

        modalContent.innerHTML = `
            <img src="${getNextGif()}" class="modal-gif" onerror="this.style.display='none'">
            <h2>${q.q}</h2>
            <div class="options-grid">
                <button class="opt-btn" onclick="checkAns(this, 'A', '${q.correct}', ${idx})">A) ${q.a}</button>
                <button class="opt-btn" onclick="checkAns(this, 'B', '${q.correct}', ${idx})">B) ${q.b}</button>
                ${q.c ? `<button class="opt-btn" onclick="checkAns(this, 'C', '${q.correct}', ${idx})">C) ${q.c}</button>` : ''}
                ${q.d ? `<button class="opt-btn" onclick="checkAns(this, 'D', '${q.correct}', ${idx})">D) ${q.d}</button>` : ''}
            </div>
            <p style="font-size: 1.5rem;">Vez de: <b>${teams[currentTeamIdx].name}</b></p>
        `;
    }

    function checkAns(btn, chosen, correct, idx) {
        const q = questions[idx % questions.length];
        const isCorrect = chosen === correct.trim();
        
        if(isCorrect) {
            btn.classList.add('correct');
            teams[currentTeamIdx].score += (q.pts || 10);
            cardStates[idx] = { correct: true, mark: '✅' };
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else {
            btn.classList.add('wrong');
            cardStates[idx] = { correct: false, mark: '❌' };
        }

        document.getElementById('exp-box').innerHTML = `<b>Resposta: ${correct}</b><br>${q.exp}`;
        document.getElementById('exp-box').style.display = 'block';
        document.getElementById('btn-continue').style.display = 'block';
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        currentTeamIdx = (originalTurnIdx + 1) % teams.length;
        renderBoard();
        if(Object.keys(cardStates).length === questions.length) showFinal();
    }

    function showFinal() {
        clearInterval(globalTimerInterval);
        const sorted = [...teams].sort((a,b) => b.score - a.score);
        document.getElementById('modal-content').innerHTML = `
            <h1>🏆 RESULTADO FINAL 🏆</h1>
            <div class="podium-container">
                <div class="podium-step podium-2">${sorted[1]?.name || '-'}<br>${sorted[1]?.score || 0} pts</div>
                <div class="podium-step podium-1">${sorted[0]?.name || '-'}<br>${sorted[0]?.score || 0} pts</div>
                <div class="podium-step podium-3">${sorted[2]?.name || '-'}<br>${sorted[2]?.score || 0} pts</div>
            </div>
            <button class="action-btn" onclick="location.reload()">REINICIAR</button>
        `;
        document.getElementById('modal-overlay').style.display = 'flex';
    }
</script>
</body>
</html>

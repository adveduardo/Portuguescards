<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eduardo Goulart</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --primary: #5487e3; --accent: #f1c40f; --danger: #ff6b6b;
            --success: #2ecc71; --joker: #9b59b6; --text: #333; --card-bg: white; --border: #ccc;
        }
        body.dark-mode { --bg: #121212; --text: #f0f0f0; --card-bg: #1e1e1e; --border: #333; }
        html, body { overscroll-behavior-y: none; } 
        body { font-family: 'Arial Rounded MT Bold', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: 0.3s; }

        #setup-menu { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; border-top: 10px solid var(--primary); width: 90%; max-width: 600px; }
        .input-group { margin: 12px 0; display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; position: relative; }
        label { font-weight: bold; font-size: 0.9rem; }
        input[type="number"], input[type="range"], select, textarea, input[type="text"] { width: 100%; max-width: 350px; padding: 12px; border-radius: 8px; border: 2px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 18px; text-align: center; }
        
        .code-block { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 8px; text-align: left; font-family: 'Courier New', monospace; font-size: 0.75rem; overflow-x: auto; width: 100%; max-width: 450px; position: relative; margin-top: 10px; cursor: pointer; line-height: 1.4; }
        .copy-hint { position: absolute; right: 10px; top: 5px; color: var(--success); font-size: 0.7rem; font-weight: bold; }
        .btn-aux { position: absolute; right: 10px; top: 35px; background: var(--primary); color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; z-index: 5; }

        #global-timer-display { background: var(--danger); color: white; padding: 5px 15px; border-radius: 20px; font-size: 1.2rem; font-weight: bold; min-width: 100px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; width: 95%; max-width: 1400px; padding: 20px; }
        .grid.tictactoe { grid-template-columns: repeat(3, 1fr) !important; max-width: 400px; }
        
        .card { aspect-ratio: 1/1; background: var(--primary); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #3d6dbd; font-weight: bold; }
        .card.used-correct { background: var(--card-bg) !important; color: var(--text) !important; border: 3px solid var(--success) !important; box-shadow: none; }
        .card.used-wrong { background: var(--danger) !important; color: white !important; box-shadow: none; }

        #score-board { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; padding: 10px; width: 100%; }
        .team-card { background: var(--card-bg); padding: 8px 15px; border-radius: 10px; border: 3px solid var(--border); min-width: 80px; text-align: center; }
        .team-card.active { border-color: var(--accent); transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        #modal { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 100%; max-width: 700px; text-align: center; max-height: 90vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 35px; font-weight: bold; cursor: pointer; display: none; color: var(--danger); }
        #modal.stop-mode .close-modal { display: block; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .opt-btn { padding: 15px; border: 2px solid var(--primary); border-radius: 10px; background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: bold; }
        .opt-btn.correct { background-color: var(--success) !important; color: white !important; }
        .opt-btn.wrong { background-color: var(--danger) !important; color: white !important; }

        #exp-box { margin-top: 15px; padding: 12px; border-radius: 8px; background: #e8f4fd; color: #2c3e50; border-left: 5px solid var(--primary); text-align: left; display: none; }
        .action-btn { padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.3s; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: var(--primary); margin: 0;">🎮 Quiz Master 🎮</h1>
    <p style="margin: 5px 0 15px 0; font-weight: bold;">Prof: Eduardo Goulart</p>

    <div class="input-group">
        <button onclick="togglePrompt()" style="background:#333; color:white; padding:10px; border-radius:8px; border:none; width:100%; cursor:pointer;">🤖 ASSISTENTE: GERAR PROMPT</button>
        <div id="prompt-container" style="display:none; align-items: center; flex-direction: column;">
            <div class="code-block" id="prompt-to-copy" onclick="copyPromptText()">
                <span class="copy-hint">CLIQUE PARA COPIAR</span>
                Atue como um professor de Português. Gere questões seguindo o formato JSON puro. Misture Múltipla Escolha e V/F. Estrutura: {"q":"?","a":"A","b":"B","c":"","d":"","correct":"A","pts":10,"exp":"..."}
            </div>
        </div>
    </div>

    <div class="input-group">
        <label>1. Colar Questões (JSON):</label>
        <button class="btn-aux" onclick="pasteJSON()">📋 Colar</button>
        <textarea id="jsonInput" placeholder="Cole o código aqui..." style="height: 60px; padding-right: 70px;"></textarea>
    </div>

    <div class="input-group">
        <label>2. Nomes dos Grupos (Por vírgula):</label>
        <button class="btn-aux" onclick="cleanNames()">✨ Limpar</button>
        <textarea id="teamNamesInput" placeholder="Ex: 1. João, 2. Maria..." style="height: 45px; font-size: 14px; padding-right: 80px;"></textarea>
    </div>

    <div class="input-group">
        <label>Modo de Jogo:</label>
        <select id="gameModeSel" onchange="handleModeChange()">
            <option value="classic">Modo Padrão (Grid Dinâmica)</option>
            <option value="tictactoe">Jogo da Velha (3x3)</option>
            <option value="stop">Stop Digital (Sequencial)</option>
        </select>
    </div>

    <div id="extra-configs">
        <div class="input-group" id="joker-area">
            <label id="jokerLabel">Probabilidade Surpresa: <b id="jokerVal">15%</b></label>
            <input type="range" id="jokerProb" min="0" max="50" value="15" oninput="document.getElementById('jokerVal').innerText = this.value + '%'">
        </div>
        <div class="input-group" id="team-count-area">
            <label>Quantidade de Grupos:</label>
            <input type="number" id="teamCount" value="4" min="1">
        </div>
        <div class="input-group" id="rebound-area">
            <label style="font-weight: bold;"><input type="checkbox" id="reboundCb" checked> 🏀 Ativar Rebote</label>
        </div>
    </div>

    <div class="input-group">
        <label>Tempo de Aula (MM:SS):</label>
        <input type="text" id="timeInput" placeholder="00:00" onkeyup="formatTimeInput(this)" value="30:00">
    </div>

    <button class="action-btn" onclick="startGame()" style="width:100%; background:var(--success); color:white; margin-top: 15px;">INICIAR</button>
</div>

<div id="game-area" style="display:none; width: 100%;">
    <div class="top-controls" style="display: flex; justify-content: space-between; width: 95%; align-items: center; margin-bottom: 20px;">
        <button onclick="toggleDarkMode()" style="font-size: 24px; background: none; border: none; cursor: pointer;">🌙</button>
        <div id="global-timer-display">00:00</div>
        <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:10px 20px; border-radius:10px; font-weight: bold;">SAIR</button>
    </div>
    <div id="score-board"></div>
    <div id="grid" class="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <span class="close-modal" onclick="handleXClick()">&times;</span>
        <div id="modal-content"></div>
        <div id="exp-box"></div>
        <div id="modal-actions" style="margin-top:20px; display:flex; gap:10px; flex-direction:column;">
            <button id="btn-rebound" class="action-btn" style="display:none; width:100%; background:var(--joker); color:white;">🏀 REBOTE</button>
            <button id="btn-continue" class="action-btn" style="display:none; width:100%; background:var(--primary); color:white;" onclick="closeModal()">PRÓXIMA</button>
        </div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let globalTimerInterval, totalSecondsLeft, questions = [], teams = [], currentTeamIdx = 0, cardStates = {}, gameMode = 'classic', isReboundActive = false, originalTurnIdx = 0, currentStopIdx = 0, quizReport = [], tttBoard = Array(9).fill(null);

    function formatTimeInput(input) {
        let value = input.value.replace(/\D/g, "");
        if (value.length > 2) value = value.substring(0, 2) + ":" + value.substring(2, 4);
        input.value = value;
    }

    function togglePrompt() { const p = document.getElementById('prompt-container'); p.style.display = p.style.display === 'none' ? 'flex' : 'none'; }
    function copyPromptText() {
        const text = "Atue como um professor de Português. Gere questões seguindo o formato JSON puro. Misture Múltipla Escolha e V/F. Estrutura: {\"q\":\"?\",\"a\":\"A\",\"b\":\"B\",\"c\":\"\",\"d\":\"\",\"correct\":\"A\",\"pts\":10,\"exp\":\"...\"}";
        navigator.clipboard.writeText(text); alert("Prompt copiado!");
    }

    async function pasteJSON() { try { const t = await navigator.clipboard.readText(); document.getElementById('jsonInput').value = t; } catch (e) { alert('Erro ao colar.'); } }

    function cleanNames() {
        const input = document.getElementById('teamNamesInput');
        // Remove números no início, pontos, traços e limpa espaços extras
        let names = input.value.split(',').map(n => {
            return n.replace(/^\d+[\.\-\s]*/, '').trim();
        }).filter(n => n !== "");
        input.value = names.join(', ');
    }

    function handleXClick() {
        if (gameMode === 'stop' && confirm("Encerrar jogo agora?")) showFinal();
        else closeModal();
    }

    function handleModeChange() {
        const mode = document.getElementById('gameModeSel').value;
        const jokerArea = document.getElementById('joker-area');
        const teamArea = document.getElementById('team-count-area');
        const reboundArea = document.getElementById('rebound-area');
        const jokerInp = document.getElementById('jokerProb');
        const jokerVal = document.getElementById('jokerVal');
        const teamInp = document.getElementById('teamCount');
        const reboundCb = document.getElementById('reboundCb');

        if(mode === 'stop') {
            jokerArea.style.display = 'none';
            teamArea.style.display = 'none';
            reboundArea.style.display = 'none';
            jokerInp.value = 0;
            jokerVal.innerText = "0%";
            reboundCb.checked = false;
        } else if(mode === 'tictactoe') {
            jokerArea.style.display = 'none';
            teamArea.style.display = 'none';
            reboundArea.style.display = 'none';
            teamInp.value = 2;
            jokerInp.value = 0;
            jokerVal.innerText = "0%";
            reboundCb.checked = false;
        } else {
            jokerArea.style.display = 'block';
            teamArea.style.display = 'block';
            reboundArea.style.display = 'block';
            teamInp.disabled = false;
            jokerInp.disabled = false; jokerInp.value = 15; jokerVal.innerText = "15%";
            reboundCb.disabled = false; reboundCb.checked = true;
        }
    }

    function startGame() {
        const jsonText = document.getElementById('jsonInput').value;
        gameMode = document.getElementById('gameModeSel').value;
        if(jsonText.trim() === "") return alert("Cole as questões!");
        try { questions = JSON.parse(jsonText); } catch(e) { return alert("Erro no JSON!"); }

        const timeParts = document.getElementById('timeInput').value.split(":");
        totalSecondsLeft = (parseInt(timeParts[0]) * 60) + (parseInt(timeParts[1]) || 0);

        const customNames = document.getElementById('teamNamesInput').value.split(',').map(n => n.trim()).filter(n => n !== "");
        const inputNum = parseInt(document.getElementById('teamCount').value) || 1;
        const nTeamsFinal = Math.max(customNames.length, inputNum);
        
        teams = [];
        for(let i=0; i < nTeamsFinal; i++) {
            teams.push({name: customNames[i] || `Grupo ${i+1}`, score: 0, color: `hsl(${(i*137)%360}, 70%, 50%)`});
        }

        clearInterval(globalTimerInterval);
        startGlobalTimer();
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';

        if(gameMode === 'stop') document.getElementById('grid').style.display = 'none', loadStopQuestion();
        else renderBoard();
    }

    function startGlobalTimer() {
        globalTimerInterval = setInterval(() => {
            totalSecondsLeft--;
            let m = Math.floor(totalSecondsLeft / 60), s = totalSecondsLeft % 60;
            document.getElementById('global-timer-display').innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            if(totalSecondsLeft <= 0) showFinal();
        }, 1000);
    }

    function renderBoard() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        grid.className = 'grid ' + (gameMode === 'tictactoe' ? 'tictactoe' : '');
        const total = gameMode === 'tictactoe' ? 9 : questions.length;
        for(let i=0; i<total; i++) {
            const card = document.createElement('div'), st = cardStates[i];
            card.className = 'card' + (st ? (st.correct ? ' used-correct' : ' used-wrong') : '');
            card.innerHTML = st ? (st.mark || '') : (i + 1);
            card.onclick = () => { 
                if(!cardStates[i]) { 
                    originalTurnIdx = currentTeamIdx; 
                    const prob = parseInt(document.getElementById('jokerProb').value);
                    if(gameMode === 'classic' && Math.random()*100 < prob) showSurprise(i);
                    else showQuestion(i);
                } 
            };
            grid.appendChild(card);
        }
        renderScores();
    }

    function loadStopQuestion() {
        if(currentStopIdx >= questions.length) return showFinal();
        showQuestion(currentStopIdx);
    }

    function showQuestion(idx) {
        const q = questions[idx % questions.length];
        const modal = document.getElementById('modal');
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'none';
        document.getElementById('btn-rebound').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';

        if (gameMode === 'stop') modal.classList.add('stop-mode');
        else modal.classList.remove('stop-mode');
        
        const isVF = !q.c || q.c.trim() === "";
        document.getElementById('modal-content').innerHTML = `<h2>${q.q}</h2><div class="options-grid">
            <button class="opt-btn" onclick="checkAns(this, 'A', '${q.correct}', ${idx})">A: ${q.a}</button>
            <button class="opt-btn" onclick="checkAns(this, 'B', '${q.correct}', ${idx})">B: ${q.b}</button>
            ${!isVF ? `<button class="opt-btn" onclick="checkAns(this, 'C', '${q.correct}', ${idx})">C: ${q.c}</button><button class="opt-btn" onclick="checkAns(this, 'D', '${q.correct}', ${idx})">D: ${q.d}</button>` : ''}
        </div><p>Vez de: <b>${teams[currentTeamIdx].name}</b></p>`;
    }

    function checkAns(btn, chosen, correct, idx) {
        const q = questions[idx % questions.length];
        const isCorrect = chosen === correct.trim();
        const allBtns = document.querySelectorAll('.opt-btn');

        if(isCorrect) {
            btn.classList.add('correct');
            let gain = isReboundActive ? Math.floor(q.pts / 2) : (parseInt(q.pts) || 10);
            teams[currentTeamIdx].score += gain;
            cardStates[idx] = {correct: true, mark: gameMode==='tictactoe'?(currentTeamIdx===0?'X':'O'):'✅'};
            if(gameMode === 'tictactoe') tttBoard[idx] = currentTeamIdx;
        } else {
            btn.classList.add('wrong');
            if(gameMode !== 'stop' && document.getElementById('reboundCb').checked && !isReboundActive) {
                isReboundActive = true;
                const rebBtn = document.getElementById('btn-rebound'); rebBtn.style.display = 'block';
                allBtns.forEach(b => b.disabled = true);
                rebBtn.onclick = () => { currentTeamIdx = (currentTeamIdx + 1) % teams.length; renderScores(); allBtns.forEach(b => { if(!b.classList.contains('wrong')) b.disabled = false; }); rebBtn.style.display = 'none'; };
                return;
            }
            cardStates[idx] = {correct: false, mark: '❌'};
        }
        document.getElementById('exp-box').innerHTML = `<b>Resposta: ${q.correct}</b><br>${q.exp || ""}`;
        document.getElementById('exp-box').style.display = 'block';
        document.getElementById('btn-continue').style.display = 'block';
        allBtns.forEach(b => b.disabled = true);
    }

    function showSurprise(idx) {
        const modal = document.getElementById('modal-content');
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'block';
        const team = teams[currentTeamIdx];
        if(Math.random() < 0.5) {
            const p = Math.floor(Math.random()*6)+5;
            modal.innerHTML = `<h1>💣 BOMBA!</h1><span style="font-size:40px; color:var(--danger)">-${p} pts</span>`;
            team.score -= p; cardStates[idx] = {correct: false, mark: '💣'};
        } else {
            const vicIdx = (currentTeamIdx + 1) % teams.length;
            modal.innerHTML = `<h1>🥷 ROUBO!</h1><p>${team.name} roubou do ${teams[vicIdx].name}</p>`;
            teams[vicIdx].score -= 10; team.score += 10; cardStates[idx] = {correct: true, mark: '🥷'};
        }
        renderScores();
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        if(gameMode === 'stop') { currentStopIdx++; currentTeamIdx = (currentTeamIdx + 1) % teams.length; loadStopQuestion(); return; }
        currentTeamIdx = (originalTurnIdx + 1) % teams.length;
        isReboundActive = false;
        if(gameMode === 'tictactoe' && checkWin()) return showFinal();
        if(Object.keys(cardStates).length === (gameMode==='tictactoe'?9:questions.length)) return showFinal();
        renderBoard();
    }

    function renderScores() {
        document.getElementById('score-board').innerHTML = teams.map((t, i) => `<div class="team-card ${i===currentTeamIdx?'active':''}" style="border-color:${t.color}"><b>${t.name}</b><br>${t.score} pts</div>`).join('');
    }

    function showFinal() {
        clearInterval(globalTimerInterval);
        const sorted = [...teams].sort((a,b) => b.score - a.score);
        confetti({ particleCount: 200, spread: 70 });
        document.getElementById('modal-content').innerHTML = `<h1>🏆 RESULTADO</h1>` + sorted.map((t, i) => `<p>${i+1}º ${t.name}: ${t.score} pts</p>`).join('') + `<button class='action-btn' style='background:var(--danger); color:white; margin-top:20px;' onclick='location.reload()'>REINICIAR</button>`;
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function checkWin() { const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; return wins.some(w => tttBoard[w[0]]!==null && tttBoard[w[0]]===tttBoard[w[1]] && tttBoard[w[0]]===tttBoard[w[2]]); }
</script>
</body>
</html>

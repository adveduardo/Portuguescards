<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Master Pro - Eduardo Goulart</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --primary: #5487e3; --accent: #f1c40f; --danger: #ff6b6b;
            --success: #2ecc71; --joker: #9b59b6; --text: #333; --card-bg: white; --border: #ccc;
        }
        body.dark-mode { --bg: #121212; --text: #f0f0f0; --card-bg: #1e1e1e; --border: #333; }
        html, body { overscroll-behavior-y: none; } 
        body { font-family: 'Arial Rounded MT Bold', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: 0.3s; }

        #setup-menu { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; border-top: 10px solid var(--primary); width: 90%; max-width: 600px; }
        .input-group { margin: 12px 0; display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; }
        label { font-weight: bold; font-size: 0.9rem; }
        input[type="number"], input[type="range"], select, textarea { width: 100%; max-width: 350px; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 16px; }
        
        input:disabled, select:disabled, .disabled-label { opacity: 0.4; cursor: not-allowed; }

        .config-box { background: var(--bg); padding: 12px; border-radius: 10px; border: 1px solid var(--border); width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 8px; text-align: left; margin: 10px auto; }
        .checkbox-row { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 0.9rem; }
        
        #global-timer-display { background: var(--danger); color: white; padding: 5px 15px; border-radius: 20px; font-size: 1.2rem; font-weight: bold; min-width: 100px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; padding: 20px; }
        .grid.tictactoe { grid-template-columns: repeat(3, 1fr); max-width: 600px; margin: 0 auto; }
        
        .card { aspect-ratio: 4/3; background: var(--primary); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 0 #3d6dbd; font-weight: bold; border: 4px solid transparent; }
        .card.used { opacity: 0.8; box-shadow: none; transform: none !important; }
        .card.used-correct { background: var(--card-bg); color: var(--text); }
        .card.used-wrong { background: var(--danger); color: white; }

        .top-controls { width: 100%; display: flex; justify-content: space-between; padding: 10px 20px; align-items: center; flex-wrap: wrap; gap: 10px; }
        .score-board { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; width: 100%; flex-wrap: wrap; }
        .team-card { background: var(--card-bg); padding: 10px; border-radius: 10px; border: 3px solid var(--border); min-width: 90px; text-align: center; }
        .team-card.active { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        #modal { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 100%; max-width: 600px; text-align: center; max-height: 85vh; overflow-y: auto; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .opt-btn { padding: 15px; border: 2px solid var(--primary); border-radius: 10px; background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .opt-btn.correct { background: var(--success) !important; color: white; }
        .opt-btn.wrong { background: var(--danger) !important; color: white; }

        .action-btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .report-item { text-align: left; background: var(--bg); padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid var(--danger); }
        
        .soundboard { display: flex; gap: 5px; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 10px; }
        .sfx-btn { background: white; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; font-size: 1.2rem; padding: 5px 10px; }
        body.dark-mode .sfx-btn { background: #333; color: white; border-color: #444; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: var(--primary); margin: 0;">🎮 Português 🇧🇷</h1>
    <p style="margin: 5px 0 15px 0; font-weight: bold;">Prof: Eduardo Goulart</p>

    <div class="input-group">
        <button onclick="togglePrompt()" style="background:#333; color:white; padding:10px; border-radius:8px; border:none; cursor:pointer; width:100%; font-size: 0.8rem;">🤖 ASSISTENTE: GERAR JSON</button>
        <div id="prompt-container" style="display:none; margin-top:10px; text-align:left; background:var(--bg); padding:10px; border-radius:8px;">
            <textarea id="prompt-text" readonly style="height:120px; font-size:11px;">Aja como um professor e formate as questões no formato JSON para o meu jogo. 
Siga EXATAMENTE esta estrutura:
[
  {
    "q": "Pergunta aqui?",
    "a": "Opção A", "b": "Opção B", "c": "Opção C", "d": "Opção D",
    "correct": "A", "pts": 10
  }
]
Envie apenas o código JSON puro.</textarea>
            <button onclick="copyPrompt()" style="width:100%; margin-top:5px; background:var(--success); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">COPIAR PROMPT JSON</button>
        </div>
    </div>

    <div class="input-group">
        <label>Colar JSON:</label>
        <textarea id="jsonInput" placeholder="Cole o código JSON aqui..." style="height: 50px;"></textarea>
    </div>

    <div class="input-group">
        <label>Nomes dos Grupos (Opcional - separados por vírgula):</label>
        <textarea id="teamNamesInput" placeholder="Ex: Feras, Sabidos, Turma A..." style="height: 40px;"></textarea>
    </div>

    <div class="input-group">
        <label>Tempo da Aula (Minutos):</label>
        <input type="number" id="globalTimeLimit" value="30" min="1" max="120">
    </div>

    <div class="input-group">
        <label>Modo de Jogo:</label>
        <select id="gameModeSel" onchange="handleModeChange()">
            <option value="classic">Modo Padrão</option>
            <option value="tictactoe">Jogo da Velha (3x3)</option>
        </select>
    </div>

    <div class="input-group">
        <label id="lblTeam">Quantidade de Grupos (1-10):</label>
        <input type="number" id="teamCount" value="2" min="1" max="10">
    </div>

    <div class="input-group">
        <label id="lblCard">Total de Cartões:</label>
        <input type="number" id="cardCount" value="15" min="1" max="100">
    </div>

    <div class="input-group">
        <label id="lblSurprise">Probabilidade Surpresa: <b id="jokerVal">10%</b></label>
        <input type="range" id="jokerProb" min="0" max="50" value="10" oninput="document.getElementById('jokerVal').innerText = this.value + '%'">
    </div>

    <div class="config-box">
        <label id="reboundLabel" class="checkbox-row"><input type="checkbox" id="reboundCb" checked> 🏀 Rebote</label>
        <label id="goldenLabel" class="checkbox-row"><input type="checkbox" id="goldenCb" checked> 👑 Carta Dourada</label>
    </div>

    <button class="action-btn" onclick="startGame()" style="width:100%; background:var(--success); color:white; font-size:1.2rem; margin-top: 10px;">INICIAR QUIZ</button>
</div>

<div id="game-area" style="display:none; width: 100%;">
    <div class="top-controls">
        <div style="display: flex; gap: 8px; align-items: center;">
            <button class="btn-fullscreen" onclick="toggleDarkMode()">🌙</button>
            <button id="musicToggle" class="btn-fullscreen" onclick="toggleMusic()">🔊</button>
            <div id="global-timer-display">30:00</div>
        </div>
        <div class="soundboard">
            <button class="sfx-btn" onclick="playSFX('applause')">👏</button>
            <button class="sfx-btn" onclick="playSFX('tada')">🎺</button>
            <button class="sfx-btn" onclick="playSFX('tension')">😱</button>
        </div>
        <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">SAIR</button>
    </div>
    <div id="score-board" class="score-board"></div>
    <div id="grid" class="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <div id="modal-content"></div>
        <button id="btn-continue" class="action-btn" style="display:none; width:100%; background:var(--primary); color:white; margin-top:15px;" onclick="closeModal()">CONCLUIR RODADA</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let musicNodes = [];
    let isMusicMuted = false;
    let globalTimerInterval;
    let totalSecondsLeft;

    function togglePrompt() { const p = document.getElementById('prompt-container'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; }
    function copyPrompt() { const t = document.getElementById('prompt-text'); t.select(); document.execCommand('copy'); alert("Prompt Copiado!"); }

    // ÁUDIO
    function playNote(freq, type, startTime, duration, vol) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, startTime);
        gain.gain.setValueAtTime(vol, startTime);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(startTime); osc.stop(startTime + duration);
    }

    function startBackgroundMusic() {
        stopMusic();
        const loop = () => {
            if(isMusicMuted) return;
            const now = audioCtx.currentTime;
            playNote(60, 'sine', now, 0.2, 0.3);
            playNote(110, 'triangle', now, 2, 0.05);
            musicNodes.push(setTimeout(loop, 2000));
        };
        loop();
    }

    function stopMusic() { musicNodes.forEach(t => clearTimeout(t)); musicNodes = []; }

    function toggleMusic() {
        isMusicMuted = !isMusicMuted;
        document.getElementById('musicToggle').innerText = isMusicMuted ? '🔇' : '🔊';
        if(isMusicMuted) stopMusic(); else startBackgroundMusic();
    }

    function playSFX(effect) {
        const now = audioCtx.currentTime;
        if(effect === 'applause') for(let i=0; i<15; i++) playNote(Math.random()*800+400, 'sine', now+(i*0.05), 0.1, 0.02);
        else if(effect === 'tada') [440, 554, 659].forEach((f, i) => playNote(f, 'sine', now+(i*0.1), 0.4, 0.1));
        else if(effect === 'tension') playNote(200, 'sawtooth', now, 1.5, 0.1);
    }

    // LÓGICA
    let questions = [], teams = [], currentTeamIdx = 0, cardStates = {}, nCardsGlob = 15;
    let gameMode = 'classic', isReboundActive = false, tttBoard = Array(9).fill(null), wrongQuestionsLog = [];

    function handleModeChange() {
        const isTTT = document.getElementById('gameModeSel').value === 'tictactoe';
        const teamInp = document.getElementById('teamCount');
        const cardInp = document.getElementById('cardCount');
        const surpriseInp = document.getElementById('jokerProb');
        if(isTTT) {
            teamInp.value = 2; teamInp.disabled = true;
            cardInp.value = 9; cardInp.disabled = true;
            surpriseInp.value = 0; surpriseInp.disabled = true;
            document.getElementById('jokerVal').innerText = "0%";
        } else {
            teamInp.disabled = false; cardInp.disabled = false; surpriseInp.disabled = false;
        }
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

    function startGame() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const jsonText = document.getElementById('jsonInput').value;
        if(jsonText.trim() !== "") {
            try { questions = JSON.parse(jsonText).map(item => [item.q, item.a, item.b, item.c, item.d, item.correct, item.pts || 10]); }
            catch(e) { alert("Erro no JSON!"); return; }
        }

        const nameInput = document.getElementById('teamNamesInput').value;
        const nTeamsInp = parseInt(document.getElementById('teamCount').value);
        if(nameInput.trim() !== "") {
            teams = nameInput.split(',').map((n, i) => ({name: n.trim(), score: 0, color: `hsl(${(i*137)%360}, 70%, 50%)`}));
        } else {
            teams = Array.from({length: nTeamsInp}, (_, i) => ({name: `Grupo ${i+1}`, score: 0, color: `hsl(${(i*360)/nTeamsInp}, 70%, 50%)`}));
        }

        gameMode = document.getElementById('gameModeSel').value;
        nCardsGlob = parseInt(document.getElementById('cardCount').value);
        totalSecondsLeft = parseInt(document.getElementById('globalTimeLimit').value) * 60;
        
        startGlobalTimer();
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        startBackgroundMusic();
        renderBoard();
    }

    function startGlobalTimer() {
        globalTimerInterval = setInterval(() => {
            totalSecondsLeft--;
            let mins = Math.floor(totalSecondsLeft / 60);
            let secs = totalSecondsLeft % 60;
            document.getElementById('global-timer-display').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if(totalSecondsLeft <= 0) { clearInterval(globalTimerInterval); showFinal(); }
        }, 1000);
    }

    function renderBoard() {
        renderScores();
        const grid = document.getElementById('grid');
        grid.className = 'grid ' + (gameMode === 'tictactoe' ? 'tictactoe' : '');
        grid.innerHTML = '';
        for (let i = 0; i < nCardsGlob; i++) {
            const card = document.createElement('div');
            card.className = 'card' + (cardStates[i] ? ' used ' + (cardStates[i].correct ? 'used-correct' : 'used-wrong') : '');
            card.innerHTML = cardStates[i] ? (cardStates[i].mark || '') : (i + 1);
            if(cardStates[i]) card.style.borderColor = cardStates[i].color;
            card.onclick = () => handleCardClick(i, card);
            grid.appendChild(card);
        }
    }

    function renderScores() {
        document.getElementById('score-board').innerHTML = teams.map((t, i) => `
            <div class="team-card ${i === currentTeamIdx ? 'active' : ''}" style="border-color:${t.color}">
                <b>${t.name}</b><br>${t.score}
            </div>
        `).join('');
    }

    function handleCardClick(idx, card) {
        if(cardStates[idx]) return;
        card.style.transform = 'rotateY(90deg)';
        setTimeout(() => {
            card.style.transform = 'rotateY(0deg)';
            showQuestion(idx);
        }, 200);
    }

    function showQuestion(idx) {
        const q = questions[idx % questions.length] || ["?", "A", "B", "C", "D", "A", 10];
        const modal = document.getElementById('modal-content');
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'none';
        modal.innerHTML = `<h2>${q[0]}</h2><div class="options-grid">${['A','B','C','D'].map((l, i) => `<button class="opt-btn" onclick="checkAns(this, '${l}', '${q[5]}', ${idx}, ${q[6]})">${l}: ${q[i+1]}</button>`).join('')}</div><p>Vez de: <b>${teams[currentTeamIdx].name}</b></p>`;
    }

    function checkAns(btn, chosen, correct, idx, pts) {
        const isCorrect = chosen === correct.trim();
        const team = teams[currentTeamIdx];
        const allBtns = document.querySelectorAll('.opt-btn');
        allBtns.forEach(b => b.disabled = true);

        if(isCorrect) {
            btn.classList.add('correct'); team.score += pts;
            cardStates[idx] = {correct: true, color: team.color, mark: gameMode === 'tictactoe' ? (currentTeamIdx === 0 ? 'X' : 'O') : '✅'};
            if(gameMode === 'tictactoe') tttBoard[idx] = currentTeamIdx;
            document.getElementById('btn-continue').style.display = 'block';
        } else {
            btn.classList.add('wrong');
            wrongQuestionsLog.push({ q: questions[idx % questions.length][0], a: correct });
            if(document.getElementById('reboundCb').checked && !isReboundActive) {
                isReboundActive = true; currentTeamIdx = (currentTeamIdx + 1) % teams.length;
                renderScores(); setTimeout(() => { allBtns.forEach(b => { if(!b.classList.contains('wrong')) b.disabled = false; }); }, 500);
            } else {
                cardStates[idx] = {correct: false, color: team.color, mark: '❌'};
                isReboundActive = false; document.getElementById('btn-continue').style.display = 'block';
            }
        }
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        if(gameMode === 'tictactoe') {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let w of wins) if (tttBoard[w[0]] !== null && tttBoard[w[0]] === tttBoard[w[1]] && tttBoard[w[0]] === tttBoard[w[2]]) { showFinal(); return; }
        }
        if(Object.keys(cardStates).length === nCardsGlob) { showFinal(); return; }
        if(!isReboundActive) currentTeamIdx = (currentTeamIdx + 1) % teams.length;
        renderBoard();
    }

    function showFinal() {
        clearInterval(globalTimerInterval); stopMusic(); playSFX('tada');
        const sorted = [...teams].sort((a,b) => b.score - a.score);
        confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
        document.getElementById('modal-content').innerHTML = `<h1>🏆 VENCEDOR: ${sorted[0].name}</h1><hr>${wrongQuestionsLog.map(e => `<div class='report-item'><b>${e.q}</b><br>Correta: ${e.a}</div>`).join('')}<button class='action-btn' style='width:100%; margin-top:20px; background:var(--danger);' onclick='location.reload()'>REINICIAR</button>`;
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'none';
    }

    function spinRoulette() {
        const avail = []; for(let i=0; i<nCardsGlob; i++) if(!cardStates[i]) avail.push(i);
        if(avail.length > 0) handleCardClick(avail[Math.floor(Math.random() * avail.length)], null);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master - Eduardo Goulart</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --primary: #5487e3;
            --accent: #f1c40f;
            --danger: #ff6b6b;
            --success: #2ecc71;
            --winner-glow: #2ecc71;
        }

        body { font-family: 'Arial Rounded MT Bold', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }

        #setup-menu { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; border-top: 8px solid var(--primary); max-width: 500px; width: 90%; }
        .input-group { margin: 15px 0; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 100%; max-width: 200px; text-align: center; font-size: 16px; }
        .info-text { font-size: 0.8rem; color: #666; background: #f8f9fa; padding: 10px; border-radius: 8px; border-left: 4px solid var(--accent); text-align: left; margin-top: 10px; }

        .score-board { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; width: 100%; }
        .team-card { background: white; padding: 10px; border-radius: 12px; border: 4px solid #ddd; min-width: 80px; text-align: center; transition: all 0.4s ease; position: relative; }
        .team-card.winning { border-color: var(--winner-glow); box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); transform: translateY(-3px); }
        .team-card.winning::after { content: "🏆"; position: absolute; top: -10px; right: -5px; font-size: 16px; }
        .team-card.active { background: #fffbe6; border-style: dashed; border-color: var(--accent); }
        .group-name { font-size: 0.7rem; color: #666; font-weight: bold; }
        .group-score { font-size: 1.5rem; font-weight: bold; color: #333; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; max-width: 1000px; width: 100%; }
        .card { aspect-ratio: 4/3; background: var(--primary); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #3d6dbd; font-weight: bold; }
        .card.used { background: #bdc3c7; box-shadow: 0 4px 0 #95a5a6; cursor: not-allowed; opacity: 0.6; }

        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index:100; justify-content: center; align-items: center; }
        #modal { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .opt-btn { padding: 15px; border: 2px solid var(--primary); border-radius: 10px; cursor: pointer; background: white; font-weight: bold; font-size: 1rem; }
        .opt-btn.correct { background: var(--success) !important; color: white; border-color: #27ae60; }
        .opt-btn.wrong { background: var(--danger) !important; color: white; border-color: #c0392b; }
        .action-btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; background: var(--primary); color: white; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h2 style="color: var(--primary); margin: 0;">🎮 Português</h2>
    <p style="margin: 5px 0 15px 0;">Eduardo Goulart</p>
    
    <div class="input-group">
        <label>Grupos (1-10):</label>
        <input type="number" id="teamCount" value="2" min="1" max="10">
    </div>
    <div class="input-group">
        <label>Cartões (1-100):</label>
        <input type="number" id="cardCount" value="16" min="1" max="100">
    </div>
    <div class="input-group">
        <label>Arquivo CSV:</label>
        <input type="file" id="csvFile" accept=".csv">
        <div class="info-text">
            <strong>Certo/Errado:</strong> Deixe as opções C e D vazias no CSV.<br>
            <em>Ex: Pergunta, Certo, Errado, , , A, 10</em>
        </div>
    </div>
    <button class="action-btn" onclick="startGame()">INICIAR JOGO</button>
</div>

<div id="game-area" style="display:none; width: 100%;">
    <div class="score-board" id="score-board"></div>
    <div class="grid" id="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <div id="m-points" style="font-weight:bold; color: var(--accent);">10 pts</div>
        <h3 id="m-question">Pergunta?</h3>
        <div class="options-grid" id="m-options"></div>
        <div style="font-size: 0.9rem;">Vez do: <strong id="current-group-display" style="color: var(--primary)">Grupo 1</strong></div>
    </div>
</div>

<script>
    let questions = [];
    let teams = [];
    let currentTeamIdx = 0;

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            questions = event.target.result.split('\n').filter(l => l.trim() !== '').map(l => l.split(','));
        };
        reader.readAsText(e.target.files[0]);
    });

    function startGame() {
        const nTeams = parseInt(document.getElementById('teamCount').value);
        const nCards = parseInt(document.getElementById('cardCount').value);
        if (questions.length === 0) {
            for(let i=0; i<nCards; i++) questions.push([`Questão ${i+1}`, "Opção A", "Opção B", "", "", "A", "10"]);
        }
        teams = Array.from({length: nTeams}, (_, i) => ({ name: `Grupo ${i+1}`, score: 0 }));
        renderScores();
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < nCards; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = i + 1;
            card.onclick = () => openQuestion(i, card);
            grid.appendChild(card);
        }
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
    }

    function renderScores() {
        const board = document.getElementById('score-board');
        board.innerHTML = '';
        const max = Math.max(...teams.map(t => t.score));
        teams.forEach((t, i) => {
            const win = t.score === max && max > 0;
            const div = document.createElement('div');
            div.className = `team-card ${i === currentTeamIdx ? 'active' : ''} ${win ? 'winning' : ''}`;
            div.innerHTML = `<div class="group-name">${t.name}</div><div class="group-score">${t.score}</div>`;
            board.appendChild(div);
        });
    }

    function openQuestion(idx, card) {
        if (card.classList.contains('used')) return;
        const q = questions[idx % questions.length];
        document.getElementById('m-question').innerText = q[0];
        document.getElementById('m-points').innerText = `${q[6] || 10} PONTOS`;
        document.getElementById('current-group-display').innerText = teams[currentTeamIdx].name;
        const opts = document.getElementById('m-options');
        opts.innerHTML = '';
        ['A','B','C','D'].forEach((l, i) => {
            const txt = q[i+1] ? q[i+1].trim() : "";
            if (txt && txt !== "-") {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = `${l}: ${txt}`;
                btn.onclick = () => {
                    const btns = document.querySelectorAll('.opt-btn');
                    btns.forEach(b => b.style.pointerEvents = 'none');
                    if (l === q[5].trim()) { btn.classList.add('correct'); teams[currentTeamIdx].score += parseInt(q[6]||10); }
                    else { btn.classList.add('wrong'); btns.forEach(b => { if(b.innerText.startsWith(q[5].trim())) b.classList.add('correct'); }); }
                    card.classList.add('used');
                    renderScores();
                    setTimeout(() => { document.getElementById('modal-overlay').style.display = 'none'; currentTeamIdx = (currentTeamIdx+1)%teams.length; renderScores(); }, 2000);
                };
                opts.appendChild(btn);
            }
        });
        document.getElementById('modal-overlay').style.display = 'flex';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Master Pro - Eduardo Goulart</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --primary: #5487e3; --accent: #f1c40f; --danger: #ff6b6b;
            --success: #2ecc71; --joker: #9b59b6; --text: #333; --card-bg: white; --border: #ccc;
        }
        body.dark-mode { --bg: #121212; --text: #f0f0f0; --card-bg: #1e1e1e; --border: #333; }
        html, body { overscroll-behavior-y: none; } 
        body { font-family: 'Arial Rounded MT Bold', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: 0.3s; }

        #setup-menu { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; border-top: 10px solid var(--primary); width: 90%; max-width: 600px; }
        .input-group { margin: 12px 0; display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; }
        label { font-weight: bold; font-size: 0.9rem; }
        textarea, select, input { width: 100%; max-width: 350px; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; padding: 20px; }
        .card { aspect-ratio: 4/3; background: var(--primary); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 0 #3d6dbd; font-weight: bold; border: 4px solid transparent; }
        .card.used { opacity: 0.8; box-shadow: none; }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        #modal { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 100%; max-width: 600px; text-align: center; max-height: 90vh; overflow-y: auto; }
        
        /* Estilo da Imagem no Quiz */
        .quiz-img { max-width: 100%; max-height: 250px; border-radius: 10px; margin-bottom: 15px; border: 2px solid var(--border); object-fit: contain; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .opt-btn { padding: 15px; border: 2px solid var(--primary); border-radius: 10px; background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: bold; }
        .opt-btn.correct { background: var(--success) !important; color: white; }
        .opt-btn.wrong { background: var(--danger) !important; color: white; }

        .action-btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: var(--success); color: white; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1>🎮 Quiz Master Pro</h1>
    <div class="input-group">
        <button onclick="togglePrompt()" style="background:#333; color:white; padding:10px; border-radius:8px; width:100%; cursor:pointer;">🤖 GERAR JSON COM IMAGENS</button>
        <div id="prompt-container" style="display:none; text-align:left; background:#eee; padding:10px; margin-top:10px; border-radius:8px;">
            <textarea id="prompt-text" readonly style="height:150px; font-size:11px;">Aja como um professor. Gere questões em JSON. 
IMPORTANTE: Para cada questão, procure um link de imagem (URL) estável e público (ex: Wikimedia, Unsplash) que sirva de contexto visual e coloque no campo "img".
Estrutura:
[
  {
    "q": "Sua pergunta?",
    "a": "Opção A", "b": "Opção B", "c": "Opção C", "d": "Opção D",
    "correct": "A", "pts": 10,
    "img": "https://link-da-imagem.jpg"
  }
]</textarea>
            <button onclick="copyPrompt()" style="width:100%; background:var(--primary); color:white; border:none; padding:8px; margin-top:5px; border-radius:5px;">COPIAR PROMPT</button>
        </div>
    </div>

    <div class="input-group">
        <label>Colar JSON aqui:</label>
        <textarea id="jsonInput" placeholder="Cole o código JSON gerado..." style="height: 80px;"></textarea>
    </div>

    <div class="input-group">
        <label>Modo de Jogo:</label>
        <select id="gameModeSel">
            <option value="classic">Padrão</option>
            <option value="tictactoe">Jogo da Velha</option>
        </select>
    </div>

    <button class="action-btn" onclick="startGame()" style="width:100%;">INICIAR QUIZ</button>
</div>

<div id="game-area" style="display:none; width:100%;">
    <div id="score-board" style="display:flex; gap:10px; justify-content:center; margin-bottom:10px;"></div>
    <div id="grid" class="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <div id="modal-content"></div>
        <button id="btn-continue" class="action-btn" style="display:none; width:100%; margin-top:10px;" onclick="closeModal()">PRÓXIMA RODADA</button>
    </div>
</div>

<script>
    let questions = [], teams = [], currentTeamIdx = 0, cardStates = {}, nCardsGlob = 15;
    let gameMode = 'classic';

    function togglePrompt() { const p = document.getElementById('prompt-container'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; }
    function copyPrompt() { const t = document.getElementById('prompt-text'); t.select(); document.execCommand('copy'); alert("Prompt Copiado! Cole no Gemini."); }

    function startGame() {
        const jsonText = document.getElementById('jsonInput').value;
        if(jsonText.trim() !== "") {
            try {
                // Mapeamos o campo 'img' que vem do JSON
                questions = JSON.parse(jsonText).map(item => ({
                    q: item.q, a: item.a, b: item.b, c: item.c, d: item.d, 
                    correct: item.correct, pts: item.pts || 10, img: item.img || ""
                }));
            } catch(e) { alert("Erro no JSON!"); return; }
        }

        gameMode = document.getElementById('gameModeSel').value;
        nCardsGlob = gameMode === 'tictactoe' ? 9 : (questions.length || 15);
        teams = [{name: "Grupo 1", score: 0, color: "#5487e3"}, {name: "Grupo 2", score: 0, color: "#ff6b6b"}];
        
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        renderBoard();
    }

    function renderBoard() {
        const grid = document.getElementById('grid');
        grid.className = 'grid ' + (gameMode === 'tictactoe' ? 'tictactoe' : '');
        grid.innerHTML = '';
        for (let i = 0; i < nCardsGlob; i++) {
            const card = document.createElement('div');
            card.className = 'card' + (cardStates[i] ? ' used' : '');
            card.innerHTML = cardStates[i] ? (cardStates[i].correct ? '✅' : '❌') : (i + 1);
            card.onclick = () => showQuestion(i);
            grid.appendChild(card);
        }
        renderScores();
    }

    function renderScores() {
        document.getElementById('score-board').innerHTML = teams.map((t, i) => `
            <div style="border-bottom: 4px solid ${t.color}; padding: 10px; ${i===currentTeamIdx?'background:#fffbe6':''}">
                <b>${t.name}</b>: ${t.score} pts
            </div>
        `).join('');
    }

    function showQuestion(idx) {
        if(cardStates[idx]) return;
        const q = questions[idx % questions.length];
        const modal = document.getElementById('modal-content');
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'none';

        // Lógica da Imagem: Se existir link, renderiza a tag <img>
        let imgHtml = q.img ? `<img src="${q.img}" class="quiz-img" onerror="this.style.display='none'">` : '';

        modal.innerHTML = `
            ${imgHtml}
            <h2>${q.q}</h2>
            <div class="options-grid">
                <button class="opt-btn" onclick="checkAns(this, 'A', '${q.correct}', ${idx}, ${q.pts})">A: ${q.a}</button>
                <button class="opt-btn" onclick="checkAns(this, 'B', '${q.correct}', ${idx}, ${q.pts})">B: ${q.b}</button>
                <button class="opt-btn" onclick="checkAns(this, 'C', '${q.correct}', ${idx}, ${q.pts})">C: ${q.c}</button>
                <button class="opt-btn" onclick="checkAns(this, 'D', '${q.correct}', ${idx}, ${q.pts})">D: ${q.d}</button>
            </div>
        `;
    }

    function checkAns(btn, chosen, correct, idx, pts) {
        const isCorrect = chosen === correct.trim();
        btn.classList.add(isCorrect ? 'correct' : 'wrong');
        if(isCorrect) teams[currentTeamIdx].score += pts;
        cardStates[idx] = {correct: isCorrect};
        document.getElementById('btn-continue').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        currentTeamIdx = (currentTeamIdx + 1) % teams.length;
        renderBoard();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Master - Eduardo Goulart</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --primary: #5487e3;
            --accent: #f1c40f;
            --danger: #ff6b6b;
            --success: #2ecc71;
            --joker: #9b59b6;
        }

        body { font-family: 'Arial Rounded MT Bold', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        #setup-menu { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; border-top: 10px solid var(--primary); width: 90%; max-width: 600px; }
        .input-group { margin: 15px 0; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        input[type="number"], input[type="range"] { width: 100%; max-width: 250px; }
        input[type="number"] { padding: 12px; border-radius: 8px; border: 1px solid #ccc; text-align: center; font-size: 18px; }
        
        /* Quadro de Informativo CSV */
        .csv-info { background: #fff9db; border: 2px dashed #f1c40f; padding: 15px; border-radius: 10px; text-align: left; font-size: 0.85rem; margin-bottom: 15px; color: #856404; }

        .preset-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 5px; }
        .preset-btn { padding: 8px 12px; font-size: 0.9rem; border: 1px solid var(--primary); background: transparent; color: var(--primary); border-radius: 5px; cursor: pointer; }

        .score-board { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; width: 100%; }
        .team-card { background: white; padding: 8px; border-radius: 12px; border: 3px solid #ddd; min-width: 65px; text-align: center; transition: 0.3s; }
        .team-card.active { background: #fffbe6; border-color: var(--accent); transform: scale(1.05); }
        .group-name { font-size: 0.6rem; font-weight: bold; color: #666; }
        .group-score { font-size: 1.2rem; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 1300px; width: 100%; padding: 10px; box-sizing: border-box; }
        .card { aspect-ratio: 4/3; background: var(--primary); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: clamp(2rem, 5vw, 3.5rem); cursor: pointer; transition: 0.2s; box-shadow: 0 6px 0 #3d6dbd; font-weight: bold; }
        .card.used { background: #bdc3c7; box-shadow: 0 6px 0 #95a5a6; border: 2px solid #7f8c8d; }

        .top-controls { width: 100%; display: flex; justify-content: flex-end; padding-right: 20px; margin-bottom: 10px; }
        .btn-restart { padding: 10px 20px; background: var(--danger); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index:100; justify-content: center; align-items: center; }
        #modal { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 600px; text-align: center; position: relative; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .opt-btn { padding: 18px; border: 2px solid var(--primary); border-radius: 12px; cursor: pointer; background: white; font-weight: bold; font-size: 1.1rem; }
        .opt-btn.correct { background: var(--success) !important; color: white; }
        .opt-btn.wrong { background: var(--danger) !important; color: white; }
        
        .btn-close-modal { margin-top: 15px; padding: 10px 25px; background: #666; color: white; border: none; border-radius: 8px; cursor: pointer; }

        .joker-title { color: var(--joker); font-size: 2.5rem; margin-bottom: 10px; }
        .action-btn { padding: 15px 40px; border: none; border-radius: 12px; cursor: pointer; background: var(--primary); color: white; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: var(--primary); margin: 0;">🎮 Português</h1>
    <p style="margin: 5px 0 20px 0;">Professor Eduardo Goulart</p>
    
    <div class="csv-info">
        <strong>📌 Formato do CSV:</strong><br>
        Pergunta, Opção A, Opção B, Opção C, Opção D, Letra Correta, Pontos<br><br>
        <strong>✅ Certo ou Errado:</strong> Deixe as opções C e D vazias.<br>
        <em>Ex: O Sol é quente, Certo, Errado, , , A, 10</em>
    </div>

    <div class="input-group">
        <label>Grupos (1-30):</label>
        <input type="number" id="teamCount" value="2" min="1" max="30">
    </div>

    <div class="input-group">
        <label>Cartões:</label>
        <input type="number" id="cardCount" value="16" min="1" max="100">
        <div class="preset-btns">
            <button class="preset-btn" onclick="setCards(16)">16</button>
            <button class="preset-btn" onclick="setCards(25)">25</button>
            <button class="preset-btn" onclick="setCards(36)">36</button>
            <button class="preset-btn" onclick="setCards(100)">100</button>
        </div>
    </div>

    <div class="input-group">
        <label>Probabilidade de Coringa: <b id="jokerVal">10%</b></label>
        <input type="range" id="jokerProb" min="0" max="50" value="10" oninput="document.getElementById('jokerVal').innerText = this.value + '%'">
    </div>

    <div class="input-group">
        <label>Arquivo CSV:</label>
        <input type="file" id="csvFile" accept=".csv">
    </div>

    <button class="action-btn" onclick="startGame()">INICIAR JOGO</button>
</div>

<div id="game-area" style="display:none; width: 100%;">
    <div class="top-controls">
        <button class="btn-restart" onclick="location.reload()">REINICIAR</button>
    </div>
    <div class="score-board" id="score-board"></div>
    <div class="grid" id="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <div id="modal-content"></div>
        <button id="close-manual" class="btn-close-modal" style="display:none" onclick="closeModal()">Fechar</button>
    </div>
</div>

<script>
    let questions = [];
    let teams = [];
    let currentTeamIdx = 0;
    let jokerChance = 10;
    let cardStates = {}; // Armazena se o card foi coringa ou pergunta

    function setCards(n) { document.getElementById('cardCount').value = n; }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            questions = event.target.result.split('\n').filter(l => l.trim() !== '').map(l => l.split(','));
        };
        reader.readAsText(e.target.files[0]);
    });

    function startGame() {
        const nTeams = parseInt(document.getElementById('teamCount').value);
        const nCards = parseInt(document.getElementById('cardCount').value);
        jokerChance = parseInt(document.getElementById('jokerProb').value);

        if (questions.length === 0) {
            for(let i=0; i<nCards; i++) questions.push([`Questão ${i+1}`, "A", "B", "", "", "A", "10"]);
        }

        teams = Array.from({length: Math.min(nTeams, 30)}, (_, i) => ({ name: `G${i+1}`, score: 0 }));
        renderScores();

        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < nCards; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = i + 1;
            card.onclick = () => handleCardClick(i, card);
            grid.appendChild(card);
        }
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
    }

    function renderScores() {
        const board = document.getElementById('score-board');
        board.innerHTML = '';
        teams.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `team-card ${i === currentTeamIdx ? 'active' : ''}`;
            div.innerHTML = `<div class="group-name">${t.name}</div><div class="group-score">${t.score}</div>`;
            board.appendChild(div);
        });
    }

    function handleCardClick(idx, card) {
        const modal = document.getElementById('modal-content');
        const closeBtn = document.getElementById('close-manual');
        document.getElementById('modal-overlay').style.display = 'flex';
        
        // Se o card já foi usado, apenas mostra o que era e libera o botão fechar
        if (card.classList.contains('used')) {
            const state = cardStates[idx];
            closeBtn.style.display = 'inline-block';
            if (state.type === 'joker') {
                modal.innerHTML = `<div class="joker-title">🃏 REABERTO</div><p>Este card foi um Coringa de ${state.val} pontos.</p>`;
            } else {
                renderQuestion(idx, true);
            }
            return;
        }

        closeBtn.style.display = 'none';
        const isJoker = Math.random() * 100 < jokerChance;

        if (isJoker) {
            const bonus = [5, 10, 15][Math.floor(Math.random() * 3)];
            cardStates[idx] = { type: 'joker', val: bonus };
            
            // Efeito de Confete
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            modal.innerHTML = `
                <div class="joker-title">🃏 CORINGA!</div>
                <h2 style="color: #333">Sorte grande!</h2>
                <p style="font-size: 1.5rem">O ${teams[currentTeamIdx].name} ganhou <b>${bonus} pontos</b>!</p>
            `;
            teams[currentTeamIdx].score += bonus;
            card.classList.add('used');
            setTimeout(() => closeModal(), 3000);
        } else {
            cardStates[idx] = { type: 'question' };
            renderQuestion(idx, false, card);
        }
    }

    function renderQuestion(idx, frozen, cardElement) {
        const q = questions[idx % questions.length];
        const modal = document.getElementById('modal-content');
        modal.innerHTML = `
            <div style="font-weight:bold; color: var(--accent); font-size: 1.2rem;">${q[6] || 10} PONTOS</div>
            <h2 style="margin: 15px 0;">${q[0]}</h2>
            <div class="options-grid" id="m-options"></div>
            ${frozen ? '' : `<div style="font-size: 1rem; border-top: 1px solid #eee; padding-top: 10px;">Vez do: <b>${teams[currentTeamIdx].name}</b></div>`}
        `;
        const optsContainer = document.getElementById('m-options');
        ['A','B','C','D'].forEach((l, i) => {
            const txt = q[i+1] ? q[i+1].trim() : "";
            if (txt && txt !== "-") {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = `${l}: ${txt}`;
                if (frozen) {
                    btn.style.pointerEvents = 'none';
                    if (l === q[5].trim()) btn.classList.add('correct');
                } else {
                    btn.onclick = () => {
                        const btns = document.querySelectorAll('.opt-btn');
                        btns.forEach(b => b.style.pointerEvents = 'none');
                        if (l === q[5].trim()) {
                            btn.classList.add('correct');
                            teams[currentTeamIdx].score += parseInt(q[6]||10);
                        } else {
                            btn.classList.add('wrong');
                            btns.forEach(b => { if(b.innerText.startsWith(q[5].trim())) b.classList.add('correct'); });
                        }
                        cardElement.classList.add('used');
                        setTimeout(() => closeModal(), 2500);
                    };
                }
                optsContainer.appendChild(btn);
            }
        });
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        // Só passa a vez se não for uma reabertura manual
        if (document.getElementById('close-manual').style.display === 'none') {
            currentTeamIdx = (currentTeamIdx + 1) % teams.length;
        }
        renderScores();
    }
</script>
</body>
</html>

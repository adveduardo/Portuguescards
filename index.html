<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Master Pro - Eduardo Goulart</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --primary: #5487e3; --accent: #f1c40f; --danger: #ff6b6b;
            --success: #2ecc71; --joker: #9b59b6; --text: #333; --card-bg: white; --border: #ccc;
        }
        body.dark-mode { --bg: #121212; --text: #f0f0f0; --card-bg: #1e1e1e; --border: #333; }
        html, body { overscroll-behavior-y: none; } 
        body { font-family: 'Arial Rounded MT Bold', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: 0.3s; }

        #setup-menu { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; border-top: 10px solid var(--primary); width: 90%; max-width: 600px; }
        .input-group { margin: 12px 0; display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; position: relative; }
        label { font-weight: bold; font-size: 0.9rem; }
        input[type="number"], input[type="range"], select, textarea { width: 100%; max-width: 350px; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 16px; }
        
        .paste-btn { position: absolute; right: 10px; top: 35px; background: var(--primary); color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; z-index: 5; }
        .hint-text { font-size: 0.75rem; color: #666; margin-top: 4px; max-width: 350px; line-height: 1.2; }

        input:disabled, select:disabled, .disabled-label { opacity: 0.4; cursor: not-allowed; background: #e9ecef !important; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; padding: 20px; }
        .grid.tictactoe { grid-template-columns: repeat(3, 1fr) !important; max-width: 600px; }
        .card { aspect-ratio: 4/3; background: var(--primary); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 0 #3d6dbd; font-weight: bold; border: 4px solid transparent; }
        .card.used-correct { background: var(--card-bg) !important; color: var(--text) !important; border: 4px solid var(--success) !important; box-shadow: none; }
        .card.used-wrong { background: var(--danger) !important; color: white !important; box-shadow: none; }
        .card.golden { background: linear-gradient(45deg, #ffd700, #f1c40f) !important; color: #333 !important; box-shadow: 0 0 15px #ffd700; }

        .team-card { background: var(--card-bg); padding: 10px; border-radius: 10px; border: 3px solid var(--border); min-width: 90px; text-align: center; }
        .team-card.active { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        #modal { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 100%; max-width: 600px; text-align: center; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .opt-btn { padding: 15px; border: 2px solid var(--primary); border-radius: 10px; background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: bold; }
        .opt-btn.correct { background-color: var(--success) !important; color: white !important; }
        .opt-btn.wrong { background-color: var(--danger) !important; color: white !important; }

        #exp-box { margin-top: 15px; padding: 12px; border-radius: 8px; background: #e8f4fd; color: #2c3e50; border-left: 5px solid var(--primary); text-align: left; display: none; font-size: 0.9rem; }
        .action-btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: var(--primary); margin: 0;">🎮 Português 🇧🇷</h1>
    <p style="margin: 5px 0 15px 0; font-weight: bold;">Prof: Eduardo Goulart</p>

    <div class="input-group">
        <button onclick="togglePrompt()" style="background:#333; color:white; padding:10px; border-radius:8px; border:none; width:100%; cursor:pointer;">🤖 ASSISTENTE: GERAR PROMPT</button>
        <div id="prompt-container" style="display:none; margin-top:10px; text-align:left; background:var(--bg); padding:10px; border-radius:8px;">
            <textarea id="prompt-text" readonly style="height:140px; font-size:11px;">Aja como um professor. Gere questões de Português em JSON puro. Misture Múltipla Escolha e V/F. Para V/F, preencha apenas opções A e B, deixando C e D vazias (""). Use o campo "exp" para um comentário breve. Estrutura: [{"q":"?","a":"A","b":"B","c":"","d":"","correct":"A","pts":10,"exp":"..."}]</textarea>
            <button onclick="copyPrompt()" style="width:100%; background:var(--success); color:white; border:none; padding:8px; border-radius:5px; margin-top:5px;">COPIAR PROMPT</button>
        </div>
    </div>

    <div class="input-group">
        <label>Colar JSON:</label>
        <button class="paste-btn" onclick="pasteJSON()">📋 Colar</button>
        <textarea id="jsonInput" oninput="checkJSONAuto()" placeholder="Cole o código aqui..." style="height: 50px; padding-right: 70px;"></textarea>
    </div>

    <div class="input-group">
        <label>Nomes dos Grupos (vírgula):</label>
        <textarea id="groupNames" placeholder="Ex: Feras, Sabidos..." style="height: 40px;"></textarea>
    </div>

    <div class="input-group">
        <label>Modo de Jogo:</label>
        <select id="gameModeSel" onchange="handleModeChange()">
            <option value="classic">Modo Padrão</option>
            <option value="tictactoe">Jogo da Velha (3x3)</option>
        </select>
    </div>

    <div class="input-group">
        <label id="lblSurprise">Probabilidade Surpresa: <b id="jokerVal">10%</b></label>
        <input type="range" id="jokerProb" min="0" max="50" value="10" oninput="document.getElementById('jokerVal').innerText = this.value + '%'">
        <div class="hint-text">💣 <b>Bomba:</b> Perde pontos | 🥷 <b>Roubo:</b> Tira do rival | 👑 <b>Dourada:</b> Pontos x2</div>
    </div>

    <div class="input-group">
        <label id="lblTeam">Grupos:</label>
        <input type="number" id="teamCount" value="2" min="1" max="10">
    </div>

    <div class="input-group">
        <label id="lblCard">Total de Cartões:</label>
        <input type="number" id="cardCount" value="15" min="1" max="100">
    </div>

    <div class="config-box">
        <label class="checkbox-row"><input type="checkbox" id="reboundCb" checked> 🏀 Rebote Ativado</label>
    </div>

    <button class="action-btn" onclick="startGame()" style="width:100%; background:var(--success); color:white; margin-top: 10px;">INICIAR</button>
</div>

<div id="game-area" style="display:none; width: 100%;">
    <div class="top-controls">
        <button onclick="toggleDarkMode()">🌙</button>
        <div id="global-timer-display">30:00</div>
        <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:8px;">SAIR</button>
    </div>
    <div id="score-board" class="score-board"></div>
    <div id="grid" class="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <div id="modal-content"></div>
        <div id="exp-box"></div>
        <button id="btn-continue" class="action-btn" style="display:none; width:100%; background:var(--primary); color:white; margin-top:15px;" onclick="closeModal()">PRÓXIMA RODADA</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let globalTimerInterval, totalSecondsLeft, questions = [], teams = [], currentTeamIdx = 0, cardStates = {}, nCardsGlob = 15;
    let gameMode = 'classic', isReboundActive = false, originalTurnIdx = 0, surpriseProb = 10, tttBoard = Array(9).fill(null);

    function togglePrompt() { const p = document.getElementById('prompt-container'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; }
    function copyPrompt() { const t = document.getElementById('prompt-text'); t.select(); document.execCommand('copy'); alert("Prompt Copiado!"); }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    
    function checkJSONAuto() {
        const hasJSON = document.getElementById('jsonInput').value.trim() !== "";
        const isTTT = document.getElementById('gameModeSel').value === 'tictactoe';
        document.getElementById('teamCount').disabled = hasJSON || isTTT;
        document.getElementById('cardCount').disabled = hasJSON || isTTT;
    }

    async function pasteJSON() { 
        try { const text = await navigator.clipboard.readText(); document.getElementById('jsonInput').value = text; checkJSONAuto(); } 
        catch (err) { alert('Erro ao colar.'); } 
    }

    function handleModeChange() {
        const isTTT = document.getElementById('gameModeSel').value === 'tictactoe';
        if(isTTT) {
            document.getElementById('teamCount').value = 2; document.getElementById('teamCount').disabled = true;
            document.getElementById('cardCount').value = 9; document.getElementById('cardCount').disabled = true;
            document.getElementById('jokerProb').value = 0; document.getElementById('jokerVal').innerText = "0%";
            document.getElementById('reboundCb').checked = false;
        } else {
            document.getElementById('teamCount').disabled = false; document.getElementById('cardCount').disabled = false;
        }
    }

    function startGame() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const jsonText = document.getElementById('jsonInput').value;
        gameMode = document.getElementById('gameModeSel').value;
        if(jsonText.trim() !== "") {
            try { questions = JSON.parse(jsonText).map(i => ({...i, pts: i.pts || 10, exp: i.exp || "Gabarito confirmado."})); } 
            catch(e) { alert("Erro no JSON!"); return; }
        }

        const nameInput = document.getElementById('groupNames').value.trim();
        let names = nameInput !== "" ? nameInput.split(',').map(n => n.trim()).filter(n => n !== "") : [];
        const nTeamsInp = parseInt(document.getElementById('teamCount').value);
        const finalCount = Math.max(names.length, nTeamsInp);
        teams = [];
        for(let i=0; i<finalCount; i++) teams.push({name: names[i] || `Grupo ${i+1}`, score: 0, color: `hsl(${(i*137)%360}, 70%, 50%)`});

        nCardsGlob = gameMode === 'tictactoe' ? 9 : (questions.length || 15);
        surpriseProb = parseInt(document.getElementById('jokerProb').value);
        totalSecondsLeft = 30 * 60;
        
        startGlobalTimer();
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        renderBoard();
    }

    function startGlobalTimer() {
        globalTimerInterval = setInterval(() => {
            totalSecondsLeft--;
            let mins = Math.floor(totalSecondsLeft / 60);
            let secs = totalSecondsLeft % 60;
            document.getElementById('global-timer-display').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if(totalSecondsLeft <= 0) { clearInterval(globalTimerInterval); showFinal(); }
        }, 1000);
    }

    function renderBoard() {
        document.getElementById('score-board').innerHTML = teams.map((t, i) => `<div class="team-card ${i===currentTeamIdx?'active':''}" style="border-color:${t.color}"><b>${t.name}</b><br>${t.score}</div>`).join('');
        const grid = document.getElementById('grid');
        grid.className = 'grid ' + (gameMode === 'tictactoe' ? 'tictactoe' : '');
        grid.innerHTML = '';
        for (let i = 0; i < nCardsGlob; i++) {
            const card = document.createElement('div');
            const st = cardStates[i];
            card.className = 'card' + (st ? (st.correct ? ' used-correct' : ' used-wrong') : '');
            if(st?.isGolden) card.classList.add('golden');
            card.innerHTML = st ? (st.mark || '') : (i + 1);
            if(st) card.style.borderColor = st.color;
            card.onclick = () => handleCardClick(i, card);
            grid.appendChild(card);
        }
    }

    function handleCardClick(idx, card) {
        if(cardStates[idx]) return;
        originalTurnIdx = currentTeamIdx;
        card.style.transform = 'rotateY(90deg)';
        setTimeout(() => { 
            card.style.transform = 'rotateY(0deg)'; 
            if(Math.random()*100 < surpriseProb) {
                const r = Math.random()*100;
                if(r < 40) showSurprise('bomb', idx);
                else if(r < 80) showSurprise('steal', idx);
                else showQuestion(idx, true);
            } else showQuestion(idx, false);
        }, 200);
    }

    function showSurprise(type, idx) {
        const modal = document.getElementById('modal-content');
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'block';
        const team = teams[currentTeamIdx];
        if(type === 'bomb') {
            modal.innerHTML = `<h1>💣 BOMBA!</h1><p>${team.name} perdeu 10 pontos!</p>`;
            team.score -= 10;
            cardStates[idx] = {correct: false, color: team.color, mark: '💣'};
        } else {
            const vic = teams.find((t, i) => i !== currentTeamIdx && t.score > 0);
            modal.innerHTML = `<h1>🥷 ROUBO!</h1><p>${vic ? team.name + ' roubou 10 pts de ' + vic.name : 'Ninguém para roubar...'}</p>`;
            if(vic) { vic.score -= 10; team.score += 10; }
            cardStates[idx] = {correct: true, color: team.color, mark: '🥷'};
        }
        renderBoard();
    }

    function showQuestion(idx, isGolden) {
        const q = questions[idx % questions.length] || {q:"?",a:"A",b:"B",correct:"A",pts:10,exp:"..."};
        const modal = document.getElementById('modal-content');
        const expBox = document.getElementById('exp-box');
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'none';
        expBox.style.display = 'none';
        
        const isVF = !q.c || q.c === "";
        modal.innerHTML = `${isGolden ? "<h2 style='color:#f1c40f'>👑 CARTA DOURADA</h2>" : ""}<h2>${q.q}</h2><div class="options-grid">
            <button class="opt-btn" onclick="checkAns(this, 'A', '${q.correct}', ${idx}, ${isGolden})">A: ${q.a}</button>
            <button class="opt-btn" onclick="checkAns(this, 'B', '${q.correct}', ${idx}, ${isGolden})">B: ${q.b}</button>
            ${!isVF ? `<button class="opt-btn" onclick="checkAns(this, 'C', '${q.correct}', ${idx}, ${isGolden})">C: ${q.c}</button>` : ''}
            ${!isVF ? `<button class="opt-btn" onclick="checkAns(this, 'D', '${q.correct}', ${idx}, ${isGolden})">D: ${q.d}</button>` : ''}
        </div><p>Vez de: <b>${teams[currentTeamIdx].name}</b></p>`;
    }

    function checkAns(btn, chosen, correct, idx, isGolden) {
        const q = questions[idx % questions.length];
        const isCorrect = chosen === correct.trim();
        const allBtns = document.querySelectorAll('.opt-btn');

        if(isCorrect) {
            btn.classList.add('correct');
            teams[currentTeamIdx].score += isGolden ? q.pts * 2 : q.pts;
            cardStates[idx] = {correct: true, color: teams[currentTeamIdx].color, mark: gameMode==='tictactoe'?(currentTeamIdx===0?'X':'O'):'✅', isGolden: isGolden};
            if(gameMode === 'tictactoe') tttBoard[idx] = currentTeamIdx;
            showFeedback(q);
        } else {
            btn.classList.add('wrong');
            if(document.getElementById('reboundCb').checked && !isReboundActive) {
                isReboundActive = true; currentTeamIdx = (currentTeamIdx + 1) % teams.length;
                renderBoard(); setTimeout(() => { allBtns.forEach(b => { if(!b.classList.contains('wrong')) b.disabled = false; }); alert("🏀 REBOTE!"); }, 500);
                return;
            } else {
                if(gameMode !== 'tictactoe') cardStates[idx] = {correct: false, color: teams[currentTeamIdx].color, mark: '❌'};
                showFeedback(q);
            }
        }
        document.getElementById('btn-continue').style.display = 'block';
        allBtns.forEach(b => b.disabled = true);
    }

    function showFeedback(q) {
        const f = document.getElementById('exp-box');
        f.innerHTML = `<b>Resposta: ${q.correct}</b><br>${q.exp}`;
        f.style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        if(gameMode === 'tictactoe') {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let w of wins) if(tttBoard[w[0]] !== null && tttBoard[w[0]] === tttBoard[w[1]] && tttBoard[w[0]] === tttBoard[w[2]]) { showFinal(); return; }
        }
        if(Object.keys(cardStates).length === nCardsGlob) { showFinal(); return; }
        currentTeamIdx = (originalTurnIdx + 1) % teams.length;
        isReboundActive = false;
        renderBoard();
    }

    function showFinal() {
        clearInterval(globalTimerInterval);
        const sorted = [...teams].sort((a,b) => b.score - a.score);
        confetti({ particleCount: 200, spread: 70 });
        document.getElementById('modal-content').innerHTML = `<h1>🏆 VENCEDOR: ${sorted[0].name}</h1><button class='action-btn' style='background:var(--danger); color:white;' onclick='location.reload()'>REINICIAR</button>`;
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('modal-overlay').style.display = 'flex';
    }
</script>
</body>
</html>

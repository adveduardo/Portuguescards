<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eduardo Goulart</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Português">
    <meta name="theme-color" content="#f0f2f5">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --primary: #5487e3; --accent: #f1c40f; --danger: #ff6b6b;
            --success: #2ecc71; --joker: #9b59b6; --text: #333; --card-bg: white; --border: #ccc;
        }
        body.dark-mode { --bg: #121212; --text: #f0f0f0; --card-bg: #1e1e1e; --border: #333; }
        
        /* IMPLEMENTAÇÃO SAFE AREA IPAD */
        html, body { 
            overscroll-behavior-y: none; 
            height: 100%; 
            background-color: var(--bg); /* Mantém a cor contínua sob o relógio */
        } 
        
        body { 
            font-family: 'Arial Rounded MT Bold', sans-serif; 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            transition: 0.3s; 
            /* O segredo para não cortar o painel de pontos e grupos no iPad */
            padding-top: env(safe-area-inset-top, 20px); 
        }

        #setup-menu { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin: 20px; text-align: center; border-top: 10px solid var(--primary); width: 90%; max-width: 600px; }
        
        /* MODIFICAÇÃO DO CSS PARA ALINHAMENTO DO BLOCO ROXO */
        .input-group { margin: 12px auto; display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; position: relative; box-sizing: border-box; }
        label { font-weight: bold; font-size: 0.9rem; }
        input[type="number"], input[type="range"], select, textarea, input[type="text"], input[type="password"] { box-sizing: border-box; width: 100%; max-width: 350px; padding: 12px; border-radius: 8px; border: 2px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 18px; text-align: center; }
        .input-group button[id="btn-gerar-ia"] { box-sizing: border-box; max-width: 350px; margin-left: auto; margin-right: auto; }
        /* ------------------------------------------------ */

        .btn-aux { position: absolute; right: 10px; top: 35px; background: var(--primary); color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; z-index: 5; }

        #game-area { width: 100vw; height: 100vh; display: none; flex-direction: column; padding: 10px; box-sizing: border-box; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 5px; padding: 0 10px; }
        #score-board { display: flex; gap: 10px; justify-content: center; flex-grow: 1; flex-wrap: wrap; }
        .team-card { background: var(--card-bg); padding: 5px 15px; border-radius: 12px; border: 3px solid var(--border); min-width: 110px; text-align: center; font-size: 1.2rem; transition: 0.3s; margin-bottom: 5px; }
        .team-card.active { border-color: var(--accent); background: var(--accent); color: #000; transform: scale(1.05); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; flex-grow: 1; align-content: center; padding: 10px; box-sizing: border-box; }
        .grid.ttt-mode { grid-template-columns: repeat(3, 1fr); max-width: 600px; margin: 0 auto; }
        
        /* NOVO MODO BATALHA NAVAL 6x6 */
        .grid.batalha-mode { grid-template-columns: repeat(6, 1fr); max-width: 800px; margin: 0 auto; gap: 10px; }
        .grid.batalha-mode .card { font-size: 2.2rem; border-radius: 12px; }

        .card { aspect-ratio: 1/1; background: var(--primary); color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 6rem; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 0 #3d6dbd; font-weight: 900; border: 4px solid rgba(255,255,255,0.1); }
        .card.used-correct { background: var(--card-bg) !important; box-shadow: none; animation: popSymbol 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card.used-wrong { background: var(--danger) !important; color: white !important; box-shadow: none; font-size: 5rem; }
        
        .card.hit-ship { background: var(--danger) !important; color: white !important; font-size: 3rem !important; border-color: #c0392b; animation: popSymbol 0.4s; }
        .card.hit-water { background: #3498db !important; color: white !important; font-size: 3rem !important; border-color: #2980b9; animation: popSymbol 0.4s; }

        @keyframes popSymbol { from { transform: scale(0); } to { transform: scale(1); } }
        .symbol-x { color: #5487e3; text-shadow: 2px 2px 0px #fff; }
        .symbol-o { color: #e67e22; text-shadow: 2px 2px 0px #fff; }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        #modal { background: var(--card-bg); padding: 30px; border-radius: 25px; width: 95%; max-width: 1050px; text-align: center; max-height: 95vh; overflow-y: auto; position: relative; transition: background-color 0.3s; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .opt-btn { padding: 20px; border: 4px solid var(--primary); border-radius: 15px; background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: bold; font-size: 2rem; }
        .opt-btn.correct { background-color: var(--success) !important; color: white !important; }
        .opt-btn.wrong { background-color: var(--danger) !important; color: white !important; }
        #exp-box { margin-top: 15px; padding: 15px; border-radius: 12px; background: #e8f4fd; color: #2c3e50; border-left: 10px solid var(--primary); text-align: left; font-size: 1.3rem; display: none; }
        .action-btn { padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.4rem; transition: 0.3s; width: 100%; }
        
        #turn-display { font-size: 2.5rem; margin-top: 20px; color: var(--primary); }
        #turn-display b { color: var(--text); border-bottom: 5px solid var(--accent); }

        .podium-container { display: flex; align-items: flex-end; justify-content: center; gap: 10px; margin: 30px 0; height: 180px; }
        .podium-step { width: 140px; text-align: center; border-radius: 15px 15px 0 0; color: #333; font-weight: bold; position: relative; padding: 15px 5px; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); font-size: 1.1rem; }
        .podium-1 { height: 100%; background: #f1c40f; border: 4px solid #d4ac0d; } 
        .podium-2 { height: 70%; background: #bdc3c7; border: 4px solid #a6acaf; } 
        .podium-3 { height: 50%; background: #cd7f32; color: white; border: 4px solid #a0522d; }
        
        .all-teams-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 15px; }
        .team-rank-item { font-size: 1rem; padding: 5px; border-bottom: 1px solid #ccc; }

        .report-container { max-height: 200px; overflow-y: auto; text-align: left; background: var(--bg); padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-top: 15px; }
        .report-item { margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #ddd; font-size: 0.9rem; }
        
        /* Ocultado na tela normal, visível apenas na impressão */
        .print-header-only { display: none; }

        /* MODIFICAÇÕES ROBUSTAS PARA IMPRESSÃO EM A4 */
        @media print {
            /* Oculta tudo que não for o overlay do modal */
            body > *:not(#modal-overlay) { display: none !important; }

            /* Reseta o fundo e retira margens/paddings do body */
            html, body { 
                background: white !important; 
                height: auto !important; 
                margin: 0 !important; 
                padding: 0 !important; 
            }

            /* Quebra o flexbox do overlay para ele começar do topo */
            #modal-overlay { 
                position: static !important; 
                display: block !important; 
                background: none !important; 
                padding: 0 !important; 
            }

            /* Transforma a caixa do modal numa página lisa, sem bordas ou fundo */
            #modal { 
                position: static !important; 
                background: white !important; 
                color: black !important; 
                padding: 0 !important; 
                box-shadow: none !important; 
                width: 100% !important; 
                max-width: 100% !important; 
                margin: 0 !important; 
                border: none !important;
                border-radius: 0 !important;
                max-height: none !important;
                overflow: visible !important;
                transform: none !important;
            }

            /* Garante que o conteúdo textual apareça */
            #modal-content, .report-container, .print-header-only, .report-item { 
                visibility: visible !important; 
                display: block !important; 
            }

            /* Esconde as coisas visuais e botões */
            .hide-on-print, .action-btn, #btn-continue, #score-board, .top-bar { 
                display: none !important; 
            }
            
            /* Formatação bonita do cabeçalho */
            .print-header-only { 
                text-align: left; 
                color: black; 
                margin-bottom: 20px; 
                font-family: Arial, sans-serif; 
            }
            
            /* Remove a caixa cinza/branca e barra de rolagem da lista */
            .report-container { 
                max-height: none !important; 
                overflow: visible !important; 
                border: none !important; 
                background: white !important; 
                padding: 0 !important; 
                margin: 0 !important; 
            }
            
            /* Aumenta a fonte e formata os itens do relatório */
            .report-item { 
                page-break-inside: avoid; 
                border-bottom: 1px solid #ccc !important; 
                font-size: 14pt !important; 
                padding: 15px 0 !important; 
                color: black !important; 
                text-align: left !important;
            }

            /* Força cores exatas (preto no branco) */
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }

        /* --- ESTILOS DOS FLASHCARDS --- */
        #flashcard-area {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            background: var(--bg);
            padding: 20px;
            box-sizing: border-box;
        }

        .scene {
            width: 100%;
            max-width: 600px;
            height: 65vh; /* Altura responsiva melhorada para não dar barra de rolagem */
            min-height: 450px;
            perspective: 1000px;
        }

        .flash-card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flash-card.is-flipped {
            transform: rotateY(180deg);
        }

        .card__face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 5px solid var(--primary);
            
            /* BLOQUEIO DE ROLAGENS INDESEJADAS */
            overflow-x: hidden !important; 
            overflow-y: auto; 
            scrollbar-width: none; /* Esconde barra no Firefox */
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* Esconde barra de rolagem no Chrome/Safari (iOS) */
        .card__face::-webkit-scrollbar {
            display: none;
        }

        .card__face--front {
            background: var(--card-bg);
            color: var(--text);
            justify-content: flex-start; /* Alinha para cima para as alternativas caberem perfeitamente */
        }

        .card__face--back {
            background: var(--primary);
            color: white;
            transform: rotateY(180deg);
            justify-content: flex-start;
        }

        .nav-controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* --- NOVOS ESTILOS PARA AVALIAÇÃO (FÁCIL/DIFÍCIL) --- */
        .fc-feedback-coords { display: flex; gap: 20px; margin-top: 20px; justify-content: center; }
        .btn-fc-eval { font-size: 2.5rem; padding: 10px 20px; border-radius: 15px; border: none; cursor: pointer; transition: 0.2s; background: rgba(0,0,0,0.1); }
        .btn-fc-eval:active { transform: scale(0.9); }
        .btn-fc-eval.hard { border-bottom: 5px solid var(--danger); }
        .btn-fc-eval.easy { border-bottom: 5px solid var(--success); }
        .btn-revisar { background: var(--accent) !important; color: #000 !important; margin-top: 15px; display: none; width: 100%; max-width: 300px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: var(--primary); margin: 0;">🎮 Português 🎮</h1>
    <p style="margin: 5px 0 5px 0; font-weight: bold;">Prof: Eduardo Goulart</p>

    <div style="display:flex; justify-content:center; margin-bottom:15px;">
        <button onclick="triggerImport()" style="background:transparent; color:var(--text); border:1px solid var(--border); padding:5px 15px; border-radius:15px; font-size:0.8rem; cursor:pointer; font-weight:bold;">📂 Importar Progresso (.json)</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importGame(event)">
    </div>

    <div id="restore-session" style="display:none; background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 2px solid #ffeeba;">
        <p style="margin:0 0 10px 0; color: #856404;">⚠️ Existe um jogo em andamento!</p>
        <button onclick="restoreGame()" style="background:#856404; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Continuar Jogo</button>
        <button onclick="clearStorage()" style="background:transparent; color:#856404; border:none; text-decoration:underline; cursor:pointer; margin-left:10px;">Descartar</button>
    </div>

    <div class="input-group" style="background: rgba(155, 89, 182, 0.1); padding: 15px; border-radius: 10px; border: 2px dashed var(--joker);">
        <label style="color: var(--joker); font-size: 1.1rem;">🔮 Gerador Automático de Questões 🔮</label>
        <input type="text" id="themeInput" placeholder="Tema (Ex: Verbos)" oninput="updatePromptView()" style="margin-top:10px;">
        <input type="number" id="qtdInput" placeholder="Quantidade de Questões" value="15" oninput="updatePromptView()" style="margin-top:5px;">
        <select id="modelSel" style="margin-top:5px; font-size:14px; background: #eee;">
            <option value="openrouter/free">Auto IA 100% Grátis (Diversas)</option>
            <option value="google/gemini-2.0-flash">Google: Gemini 2.0 Flash</option>
            <option value="google/gemini-1.5-pro">Google: Gemini 1.5 Pro</option>
            <option value="openai/gpt-4o-mini">OpenAI: GPT-4o Mini</option>
            <option value="openai/gpt-4o">OpenAI: GPT-4o</option>
            <option value="anthropic/claude-3-haiku">Anthropic: Claude 3 Haiku</option>
            <option value="anthropic/claude-3.5-sonnet">Anthropic: Claude 3.5 Sonnet</option>
            <option value="meta-llama/llama-3-8b-instruct:free">Meta: Llama 3 (Grátis)</option>
        </select>
        <input type="password" id="apiKeyInput" placeholder="Sua Chave de API OpenRouter" style="margin-top:5px;">
        <button onclick="generateWithAPI()" id="btn-gerar-ia" style="background:var(--joker); color:white; padding:12px; border-radius:8px; border:none; width:100%; cursor:pointer; margin-top:10px; font-weight:bold;">⚡ GERAR QUESTÕES ⚡</button>
        <button onclick="togglePrompt()" style="background:transparent; color:var(--text); text-decoration: underline; border:none; cursor:pointer; margin-top:10px; font-size: 0.8rem;">Ver Prompt Manual</button>
        <div id="prompt-container" style="display:none; width: 100%;">
            <div class="code-block" id="prompt-to-copy" onclick="copyPromptText()"><span id="prompt-text"></span></div>
        </div>
    </div>

    <div class="input-group">
        <label>1. Colar Questões (JSON):</label>
        <button class="btn-aux" onclick="pasteJSON()">📋 Colar</button>
        <textarea id="jsonInput" placeholder="Questões aparecerão aqui..." style="height: 60px; padding-right: 70px;"></textarea>
    </div>

    <div class="input-group">
        <label>2. Nomes dos Grupos:</label>
        <button class="btn-aux" onclick="cleanNames()">✨ Limpar</button>
        <textarea id="teamNamesInput" placeholder="Nome1, Nome2..." style="height: 45px; font-size: 14px; padding-right: 80px;"></textarea>
    </div>

    <div class="input-group">
        <label>Modo de Jogo:</label>
        <select id="gameModeSel" onchange="handleModeChange()">
            <option value="classic">Modo Padrão</option>
            <option value="tictactoe">Jogo da Velha</option>
            <option value="batalha">Batalha Naval (6x6)</option>
            <option value="stop">Sequência</option>
            <option value="redacao">Temas de Redação</option>
        </select>
    </div>

    <div id="extra-configs">
        <div class="input-group" id="joker-area">
            <label>🎲 Probabilidade Surpresa: <b id="jokerVal">15%</b></label>
            <input type="range" id="jokerProb" min="0" max="50" value="15" oninput="document.getElementById('jokerVal').innerText = this.value + '%'">
        </div>
        <div class="input-group" id="team-count-area">
            <label>Quantidade de Grupos:</label>
            <input type="number" id="teamCount" value="4">
        </div>
        <div style="display: flex; gap: 15px; justify-content: center; width: 100%; margin-top: 10px; flex-wrap: wrap;">
            <label><input type="checkbox" id="reboundCb" checked> 🏀 Rebote</label>
            <label><input type="checkbox" id="gifsCb" checked> 🎬 GIFs</label>
            <label><input type="checkbox" id="soundCb" onchange="toggleSound()"> 🔊 Som</label>
            <label><input type="checkbox" id="punishCb"> 🤡 Mico</label>
        </div>
    </div>

    <div class="input-group">
        <label>Tempo (MM:SS):</label>
        <input type="text" id="timeInput" onkeyup="formatTimeInput(this)" value="30:00">
    </div>

    <button class="action-btn" onclick="startGame()" style="width:100%; background:var(--success); color:white;">INICIAR NOVO</button>
    <button class="action-btn" onclick="startFlashcards()" style="width:100%; background:var(--primary); color:white; margin-top:10px;">📚 MODO ESTUDO (FLASHCARDS) 📚</button>
</div>

<div id="game-area">
    <div class="top-bar">
        <div style="display: flex; gap: 10px;">
            <button onclick="exportGame()" style="font-size: 24px; background: none; border: none; cursor:pointer;" title="Salvar Progresso em JSON">💾</button>
            <button onclick="toggleGlobalMute()" id="mute-btn-game" style="font-size: 24px; background: none; border: none; cursor:pointer;" title="Mutar/Desmutar Som">🔊</button>
            <button onclick="toggleDarkMode()" style="font-size: 24px; background: none; border: none; cursor:pointer;">🌙</button>
            <button onclick="toggleFullScreen()" style="font-size: 24px; background: none; border: none; cursor:pointer;">📺</button>
            <button onclick="if(confirm('Deseja encerrar o jogo agora e gerar o relatório?')) showFinal()" style="font-size: 24px; background: none; border: none; cursor:pointer;" title="Encerrar Jogo e Gerar Relatório">📊</button>
        </div>
        <div id="score-board"></div>
        <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:10px; font-weight: bold; cursor:pointer;">SAIR</button>
    </div>
    <div id="grid" class="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <div id="modal-content"></div>
        <div id="exp-box"></div>
        <div id="modal-actions" style="margin-top:20px; display:flex; gap:10px; flex-direction:column;">
            <button id="btn-rebound" class="action-btn" style="display:none; background:var(--joker); color:white;">🏀 REBOTE</button>
            <button id="btn-continue" class="action-btn" style="display:none; background:var(--primary); color:white;" onclick="closeModal()">PRÓXIMA PERGUNTA</button>
        </div>
    </div>
</div>

<div id="flashcard-area">
    <div style="width: 100%; max-width: 600px; display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 20px;">
        <button onclick="toggleGlobalMute()" id="mute-btn-fc" style="font-size: 24px; background: none; border: none; cursor:pointer;" title="Mutar/Desmutar Som">🔊</button>
        <button onclick="toggleDarkMode()" style="font-size: 24px; background: none; border: none; cursor:pointer;">🌙</button>
        <button onclick="toggleFullScreen()" style="font-size: 24px; background: none; border: none; cursor:pointer;">📺</button>
    </div>
    
    <div class="scene">
        <div class="flash-card" id="flash-card-element" onclick="this.classList.toggle('is-flipped')">
            <div class="card__face card__face--front">
                <small style="color: var(--primary); font-weight: bold; margin-bottom: 15px; display: block; flex-shrink: 0;">PERGUNTA (Toque para girar)</small>
                <h2 id="fc-question" style="font-size: 1.6rem; margin: 0; width: 100%;"></h2>
            </div>
            <div class="card__face card__face--back">
                <small style="color: rgba(255,255,255,0.8); font-weight: bold; margin-bottom: 10px; display: block; flex-shrink: 0;">RESPOSTA</small>
                <h2 id="fc-answer" style="font-size: 2.2rem; margin: 0; width: 100%;"></h2>
                <div id="fc-options" style="display: none;"></div>
                <p id="fc-exp" style="font-size: 1.1rem; margin-top:15px; width: 100%;"></p>
            </div>
        </div>
    </div>
    
    <div class="nav-controls">
        <button class="action-btn" style="background:#7f8c8d; color:white; width: 80px; padding: 15px;" onclick="prevFC()">⬅️</button>
        <span id="fc-counter" style="font-size: 1.2rem; font-weight:bold; color: var(--text);">1 / 10</span>
        <button class="action-btn" style="background:#7f8c8d; color:white; width: 80px; padding: 15px;" onclick="nextFC()">➡️</button>
    </div>
    
    <button onclick="location.reload()" style="margin-top:40px; background:transparent; border:none; color:var(--text); text-decoration:underline; cursor:pointer; font-size: 1.1rem;">Voltar ao Menu Principal</button>
</div>

<script>
    let questions = [], teams = [], currentTeamIdx = 0, cardStates = {}, gameMode = 'classic', originalTurnIdx = 0, currentStopIdx = 0, quizReport = [], isReboundActive = false;
    let fleetData = []; 
    let difficultFC = [];
    
    const punishmentsList = [
        "Soletração: O aluno deve soletrar a palavra da resposta certa (ou outra palavra do tema).",
        "Polichinelo Rápido: Pagar 5 polichinelos.",
        "Equilíbrio: Dar 3 pulinhos de uma perna só.",

    function playSound(type) {
        currentAudioType = type;
        const soundCb = document.getElementById('soundCb');
        const isEnabled = soundCb && soundCb.checked;
        
        if(!isEnabled || type === 'stop') { 
            audioBg.pause(); 
            return;

        if(type === 'lobby') {
            audioBg.src = 'sons/1.mp3'; 
            audioBg.loop = true;
        } else if(type === 'question') {
            audioBg.src = 'sons/2.mp3'; 
            audioBg.loop = true;
        } else if(type === 'correct') {
            audioBg.src = 'sons/3.mp3'; 
            audioBg.loop = false;
        } else if(type === 'wrong') {
            audioBg.src = 'sons/4.mp3';

    function generateFleet() {
        fleetData = Array(36).fill('🌊'); 
        const ships = [3, 2, 2, 1, 1]; 
        
        for(let size of ships) {
            let placed = false;
            while(!placed) {
                let isHorizontal = Math.random() > 0.5;
                let row = Math.floor(Math.random() * 6);
                let col = Math.floor(Math.random() * 6);
                
                if(isHorizontal && col + size > 6) continue;
                if(!isHorizontal && row + size > 6) continue;
                
                let collision = false;
                for(let i=0; i<size; i++) {
                    let r = isHorizontal ? row : row + i;
                    let c = isHorizontal ? col + i : col;
                    if(fleetData[r * 6 + c] !== '🌊') collision = true;
                }
                
                if(!collision) {
                    for(let i=0; i<size; i++) {
                        let r = isHorizontal ? row : row + i;
                        let c = isHorizontal ? col + i : col;
                        fleetData[r * 6 + c] = '🚢';
                    }
                    placed = true;
                }
            }
        }
    }

    function importGame(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const state = JSON.parse(e.target.result);
                if(state.questions && state.teams) {
                    localStorage.setItem('edu_quiz_state', JSON.stringify(state));
                    location.reload(); 
                } else {
                    alert("Arquivo de progresso inválido ou corrompido.");
                }
            } catch(err) {
                alert("Erro ao ler o arquivo JSON.");
            }
        };
        reader.readAsText(file);
    }

    function tryNextImage(img, num, step, isFallback = false) {
        const exts = ['webp', 'png', 'jpg', 'jpeg']; 
        if(step < exts.length) {
            img.src = `gif/${num}.${exts[step]}`;
            img.onerror = () => tryNextImage(img, num, step + 1, isFallback); 
        } else {
            if(!isFallback) {
                const numGarantido = Math.floor(Math.random() * 100) + 1;
                img.src = `gif/${numGarantido}.gif`;
                img.onerror = () => tryNextImage(img, numGarantido, 0, true);
            } else {
                img.style.display = 'none'; 
            }
        }
    }

    async function generateWithAPI() {
        const btn = document.getElementById('btn-gerar-ia'); btn.innerText = "⏳..."; btn.disabled = true;
        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${document.getElementById('apiKeyInput').value}` },
                body: JSON.stringify({ model: document.getElementById('modelSel').value, messages: [{role: "user", content: document.getElementById('prompt-text').innerText}] })

            document.getElementById('jsonInput').value = data.choices[0].message.content.replace(/```json|```/g, "").trim();

    function startGame() {
        clearStorage();
        try { questions = JSON.parse(document.getElementById('jsonInput').value); } catch(e) { return alert("JSON inválido"); }
        gameMode = document.getElementById('gameModeSel').value;
        let names = document.getElementById('teamNamesInput').value.split(',').map(n => n.trim()).filter(n => n);
        let count = parseInt(document.getElementById('teamCount').value) || 2;
        const finalCount = gameMode === 'tictactoe' ? 2 : Math.max(names.length, count);
        teams = names.map(name => ({name, score: 0}));
        while(teams.length < finalCount) teams.push({name: `Grupo ${teams.length+1}`, score: 0});
        
        if(gameMode === 'batalha') generateFleet();

        const grid = document.getElementById('grid');
        if(gameMode === 'tictactoe') grid.className = 'grid ttt-mode'; 
        else if(gameMode === 'batalha') grid.className = 'grid batalha-mode';
        else grid.className = 'grid';
        
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
        
        playSound('lobby');
        
        if(gameMode === 'stop') { document.getElementById('grid').style.display = 'none'; loadStopQuestion(); } else { renderBoard(); }
        saveGameState();
    }

    function renderScores() {
        const board = document.getElementById('score-board');
        if(!board) return;
        board.innerHTML = '';
        
        if (gameMode === 'redacao') return; 
        
        teams.forEach((team, index) => {
            const card = document.createElement('div');
            card.className = 'team-card' + (index === currentTeamIdx ? ' active' : '');
            card.innerHTML = `${team.name}: <b>${team.score}</b>`;
            board.appendChild(card);
        });
    }

    function renderBoard() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        const total = gameMode === 'tictactoe' ? 9 : (gameMode === 'batalha' ? 36 : questions.length);
        const rows = ['A','B','C','D','E','F'];

        for(let i=0; i<total; i++) {
            const card = document.createElement('div'), st = cardStates[i];
            card.className = 'card' + (st ? (st.correct ? ' used-correct' : ' used-wrong') : '');
            
            if (st && st.correct && gameMode === 'tictactoe') {
                card.innerHTML = st.mark;
                card.classList.add(st.mark === 'X' ? 'symbol-x' : 'symbol-o');
            } else if (st && st.correct && gameMode === 'batalha') {
                card.innerHTML = st.mark;
                if(st.mark === '💥') card.classList.add('hit-ship');
                else card.classList.add('hit-water');
            } else {
                let textPadrao = gameMode === 'batalha' ? (rows[Math.floor(i/6)] + ((i%6)+1)) : (i + 1);
                card.innerHTML = st ? (st.mark || '') : textPadrao;
            }

            card.onclick = () => { 
                if(!cardStates[i] || gameMode === 'redacao') { 
                    originalTurnIdx = currentTeamIdx; 
                    showQuestion(i); 
                } 
            };
            grid.appendChild(card);
        }
        
        renderScores();
    }

    function checkAns(btn, chosen, correct, idx) {
        const isCorrect = chosen.trim().toUpperCase() === correct.trim().toUpperCase();
        const q = questions[idx % questions.length];
        const hasEnoughOptions = q.c !== undefined && q.c !== "";

        if(isCorrect) {
            playSound('correct');
            document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
            btn.classList.add('correct'); 
            
            let ptsGanhos = isReboundActive ? 5 : 10;
            let mark = '✅';
            let msgExtra = "";
            
            if(gameMode === 'tictactoe') {
                mark = currentTeamIdx === 0 ? 'X' : 'O';
            } else if (gameMode === 'batalha') {
                if(fleetData[idx] === '🚢') {
                    mark = '💥';
                    ptsGanhos = 15; 
                    msgExtra = `<br><b style="color:#c0392b; font-size:1.2rem;">💥 NA MOSCA! Acertou um navio! (+${ptsGanhos} pts)</b>`;
                } else {
                    mark = '🌊';
                    ptsGanhos = isReboundActive ? 5 : 10;
                    msgExtra = `<br><b style="color:#2980b9; font-size:1.2rem;">🌊 ÁGUA! Nenhuma embarcação aqui. (+${ptsGanhos} pts)</b>`;
                }
            }
            
            teams[currentTeamIdx].score += ptsGanhos;
            cardStates[idx] = { correct: true, mark: mark };
            quizReport.push({ team: teams[currentTeamIdx].name, question: q.q, isCorrect, correctLetter: correct, exp: q.exp || "" });
            
            document.getElementById('exp-box').innerHTML = `<b>Resposta: ${correct}</b>${msgExtra}<br>${q.exp || ""}`;
            document.getElementById('exp-box').style.display = 'block';
            document.getElementById('btn-continue').style.display = 'block';
            confetti({ particleCount: 150, spread: 70 });
            
            if(gameMode === 'tictactoe') {
                if(verificarVitoriaTTT()) return; 
            }
            
        } else {
            playSound('wrong');
            btn.classList.add('wrong'); btn.disabled = true;
            if (document.getElementById('reboundCb').checked && !isReboundActive && hasEnoughOptions) {
                isReboundActive = true;
                const btnReb = document.getElementById('btn-rebound');
                btnReb.style.display = 'block';
                btnReb.onclick = () => {
                    currentTeamIdx = (currentTeamIdx + 1) % teams.length;
                    document.getElementById('turn-display').innerHTML = `Vez de: <b>${teams[currentTeamIdx].name}</b> (REBOTE - Vale 5)`;
                    document.querySelectorAll('.opt-btn').forEach(b => { if(!b.classList.contains('wrong')) b.disabled = false; });
                    btnReb.style.display = 'none';
                    renderScores();
                };
            } else {
                cardStates[idx] = { correct: false, mark: '❌' };
                quizReport.push({ team: teams[currentTeamIdx].name, question: q.q, isCorrect: false, correctLetter: correct, exp: q.exp || "" });
                
                let punishmentHTML = "";
                const punishCb = document.getElementById('punishCb');
                if (punishCb && punishCb.checked) {
                    const randPunish = punishmentsList[Math.floor(Math.random() * punishmentsList.length)];
                    punishmentHTML = `
                    <div style="margin-top:15px; padding:15px; background:#fff3cd; border:2px dashed #d39e00; border-radius:10px; color:#856404; text-align:center;">
                        <b style="font-size:1.1rem;">🚨 HORA DO MICO! 🚨</b><br>
                        <span style="font-size:1.1rem; margin-top:5px; display:inline-block;">${randPunish}</span>
                    </div>`;
                }
                
                document.getElementById('exp-box').innerHTML = `<b>Resposta: ${correct}</b><br>${q.exp || ""}` + punishmentHTML;
                document.getElementById('exp-box').style.display = 'block';
                document.getElementById('btn-continue').style.display = 'block';
            }
        }
        saveGameState();
    }

    function verificarVitoriaTTT() {
        const combos = [
            [0,1,2], [3,4,5], [6,7,8], 
            [0,3,6], [1,4,7], [2,5,8], 
            [0,4,8], [2,4,6]            
        ];
        
        const markAtual = currentTeamIdx === 0 ? 'X' : 'O';
        
        for(let combo of combos) {
            const [a, b, c] = combo;
            if(cardStates[a]?.mark === markAtual && cardStates[b]?.mark === markAtual && cardStates[c]?.mark === markAtual) {
                teams[currentTeamIdx].score += 10;
                encerrarRestanteComoErro();
                setTimeout(() => { showFinal(); }, 1500);
                return true;
            }
        }
        return false;
    }

    function encerrarRestanteComoErro() {
        for(let i=0; i<9; i++) {
            if(!cardStates[i]) {
                cardStates[i] = { correct: false, mark: '❌' };
                quizReport.push({ 
                    team: "SISTEMA", 
                    question: questions[i % questions.length].q, 
                    isCorrect: false, 
                    correctLetter: "ENCERRADO", 
                    exp: "Jogo finalizado por vitória na linha." 
                });
            }
        }
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        playSound('lobby');
        if(gameMode === 'stop') { currentStopIdx++; currentTeamIdx = (currentTeamIdx + 1) % teams.length; loadStopQuestion(); return; }
        
        currentTeamIdx = (originalTurnIdx + 1) % teams.length;
        renderBoard();
        
        if(gameMode === 'batalha') {
            let shipsSunk = Object.values(cardStates).filter(s => s.mark === '💥').length;
            if(shipsSunk === 9 || Object.keys(cardStates).length === 36) return showFinal();
        } else {
            const total = gameMode === 'tictactoe' ? 9 : questions.length;
            if(Object.keys(cardStates).length === total) return showFinal();
        }
        
        saveGameState();
    }

    function loadStopQuestion() { if(currentStopIdx < questions.length) showQuestion(currentStopIdx); else showFinal(); }

            const printHeader = `
                <div class="print-header-only">
                    <h2 style="margin:0;">Temas de Redação</h2>
                    <h3 style="margin:5px 0;">Prof: Eduardo Goulart</h3>
                    <p style="margin:5px 0;">Data: ${hoje}</p>
                    <hr style="border-top: 2px solid #000; margin: 15px 0;">
                </div>
            `;

            document.getElementById('modal-content').innerHTML = `
                ${printHeader}
                <h1 class="hide-on-print">✍️ TODOS OS TEMAS CONCLUÍDOS ✍️</h1>
                <h3 class="hide-on-print">Relatório de Temas por Aluno</h3>
                ${reportHTML}
                <div class="hide-on-print" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                    <button class="action-btn" onclick="copyReport()" style="background:var(--primary); color:white; font-size:1rem;">📋 Copiar Temas</button>
                    <button class="action-btn" onclick="window.print()" style="background:var(--joker); color:white; font-size:1rem;">🖨️ Imprimir/PDF</button>
                </div>
                <button class="action-btn hide-on-print" onclick="restartGame()" style="background:var(--danger); color:white; margin-top:10px;">REINICIAR TUDO</button>
            `;
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('btn-continue').style.display = 'none';
            clearStorage();
            return;
        }

        const sorted = [...teams].sort((a,b) => b.score - a.score);
        
        let p1 = [], p2 = [], p3 = [];
        if(sorted.length > 0) {
            let s1 = sorted[0].score;
            p1 = sorted.filter(t => t.score === s1);
            let remaining = sorted.filter(t => t.score < s1);
            if(remaining.length > 0) {
                let s2 = remaining[0].score;
                p2 = remaining.filter(t => t.score === s2);
                let remaining2 = remaining.filter(t => t.score < s2);
                if(remaining2.length > 0) {
                    let s3 = remaining2[0].score;
                    p3 = remaining2.filter(t => t.score === s3);
                }
            }
        }

        const renderPodiumStep = (teamsArr, posClass) => {
            if(teamsArr.length === 0) return `<div class="podium-step ${posClass}">-</div>`;
            return `<div class="podium-step ${posClass}">${teamsArr.map(t => t.name).join('<br>')}<br>${teamsArr[0].score} pts</div>`;
        };

        let podiumHTML = `<div class="podium-container">${renderPodiumStep(p2, 'podium-2')}${renderPodiumStep(p1, 'podium-1')}${renderPodiumStep(p3, 'podium-3')}</div>`;
        let allTeamsHTML = `<div class="all-teams-list">` + sorted.map((t, i) => `<div class="team-rank-item">#${i+1} <b>${t.name}</b>: ${t.score}p</div>`).join('') + `</div>`;
        let reportHTML = `<div id="printable-report" class="report-container">` + quizReport.map(r => `<div class="report-item"><b>${r.team}</b>: ${r.isCorrect ? 'ACERTOU' : 'ERROU'}<br><small>Q: ${r.question} | Gab: ${r.correctLetter}</small></div>`).join('') + `</div>`;

        const printHeader = `
            <div class="print-header-only">
                <h2 style="margin:0;">Relatório de Atividade</h2>
                <h3 style="margin:5px 0;">Prof: Eduardo Goulart</h3>
                <p style="margin:5px 0;">Data: ${hoje}</p>
                <hr style="border-top: 2px solid #000; margin: 15px 0;">
            </div>
        `;

        document.getElementById('modal-content').innerHTML = `
            ${printHeader}
            <h1 class="hide-on-print">🏆 RESULTADO FINAL 🏆</h1>
            <div class="hide-on-print">${podiumHTML}</div>
            <h3 class="hide-on-print">Classificação Geral</h3>
            <div class="hide-on-print">${allTeamsHTML}</div>
            <h3 class="hide-on-print">Relatório Pedagógico</h3>
            ${reportHTML}
            <div class="hide-on-print" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                <button class="action-btn" onclick="copyReport()" style="background:var(--primary); color:white; font-size:1rem;">📋 Copiar Relatório</button>
                <button class="action-btn" onclick="window.print()" style="background:var(--joker); color:white; font-size:1rem;">🖨️ Imprimir/PDF</button>
            </div>
            <button class="action-btn hide-on-print" onclick="restartGame()" style="background:var(--danger); color:white; margin-top:10px;">REINICIAR TUDO</button>
        `;
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'none';
        clearStorage();
    }

    function copyReport() {
        const text = quizReport.map(r => {
            if (gameMode === 'redacao') return `ALUNO: ${r.team} | TEMA: ${r.question.replace('REDAÇÃO: ', '')}`;
            return `${r.team} - ${r.isCorrect ? 'ACERTOU' : 'ERROU'} - Questão: ${r.question}`;
        }).join('\n');
        
        navigator.clipboard.writeText("RELATÓRIO DE AULA - PROF. EDUARDO\n\n" + text);
        alert("Copiado para a área de transferência!");
    }

    function restartGame() {
        clearStorage();
        location.reload();
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    
    window.onload = () => {
        checkExistingGame();
        updatePromptView();
    }

    let currentFCIdx = 0;

    function startFlashcards() {
        try { 
            questions = JSON.parse(document.getElementById('jsonInput').value); 
        } catch(e) { 
            return alert("Por favor, gere ou cole o JSON das questões primeiro!"); 
        }
        
        if(questions.length === 0) return alert("Nenhuma questão encontrada.");

        difficultFC = [];
        document.getElementById('btn-revisar-fc')?.remove();

        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('flashcard-area').style.display = 'flex';
        currentFCIdx = 0;
        renderFC();
    }

    function renderFC() {
        const card = document.getElementById('flash-card-element');
        const wasFlipped = card.classList.contains('is-flipped');

        card.classList.remove('is-flipped');

        const atualizarConteudo = () => {
            const q = questions[currentFCIdx];
            let perguntaText = q.q || q.pergunta || "Pergunta não encontrada";
            
            let respostaFinal = "";
            let optionsHTML_Front = "";
            let optionsHTML_Back = "";

            if (q.a || q.b || q.c || q.d) {
                let letraCorreta = q.correct ? q.correct.trim().toUpperCase() : "A";
                let textoCorreto = q[letraCorreta.toLowerCase()] || q[letraCorreta] || "";
                
                optionsHTML_Front = `<div style="text-align: left; font-size: 1.1rem; margin-top: 20px; font-weight: normal; width: 100%; box-sizing: border-box; word-wrap: break-word;">`;
                ['A', 'B', 'C', 'D'].forEach(opt => {
                    let textoOpt = q[opt.toLowerCase()] || q[opt];
                    if (textoOpt) {
                        optionsHTML_Front += `<div style="margin-bottom:8px; line-height: 1.3;"><b>${opt})</b> ${textoOpt}</div>`;
                    }
                });
                optionsHTML_Front += `</div>`;
                
                perguntaText += optionsHTML_Front;

                respostaFinal = `<span style="font-size: 1.1rem; color: rgba(255,255,255,0.9);">Gabarito: <b>${letraCorreta}</b></span><br>
                                 <span style="font-size: 1.3rem; font-weight: bold; color: #f1c40f;">${textoCorreto}</span>`;
                
                optionsHTML_Back = `<div style="text-align: left; font-size: 0.95rem; margin-top: 15px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; max-width: 100%; word-wrap: break-word; line-height: 1.3;">`;
                ['A', 'B', 'C', 'D'].forEach(opt => {
                    let textoOpt = q[opt.toLowerCase()] || q[opt];
                    if (textoOpt) {
                        let isCorrect = opt === letraCorreta;
                        optionsHTML_Back += `<div style="margin-bottom:5px; ${isCorrect ? 'color:#2ecc71; font-weight:900;' : 'opacity:0.8;'}">
                                                ${opt}) ${textoOpt} ${isCorrect ? ' ✓' : ''}
                                            </div>`;
                    }
                });
                optionsHTML_Back += `</div>`;
                
                document.getElementById('fc-options').innerHTML = optionsHTML_Back;
                document.getElementById('fc-options').style.display = 'block';
            } 
            else {
                respostaFinal = q.resposta || q.answer || "Resposta não definida";
                document.getElementById('fc-options').style.display = 'none';
            }
            
            document.getElementById('fc-question').innerHTML = perguntaText;
            document.getElementById('fc-answer').innerHTML = respostaFinal;
            
            let expOriginal = q.exp ? `<div style="margin-top:10px; font-style: italic; font-size: 0.95rem; border-top: 1px dashed rgba(255,255,255,0.4); padding-top: 10px; line-height: 1.3;">Explicação: ${q.exp}</div>` : "";
            
            let botoesAvaliacao = `
                <div class="fc-feedback-coords" onclick="event.stopPropagation()" style="margin-top: 15px; width: 100%; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 15px;">
                    <div style="display: flex; gap: 20px; justify-content: center;">
                        <button class="btn-fc-eval hard" onclick="avaliarFC(true)" title="Achei Difícil" style="display:flex;flex-direction:column;align-items:center;padding:10px 20px; background: rgba(255,255,255,0.1); border-radius: 12px; border: none; cursor: pointer;">
                            <span style="font-size: 1.5rem;">❌</span>
                            <span style="font-size:0.8rem; font-weight:bold; margin-top:5px; color:white;">Difícil (⬇)</span>
                        </button>
                        <button class="btn-fc-eval easy" onclick="avaliarFC(false)" title="Achei Fácil" style="display:flex;flex-direction:column;align-items:center;padding:10px 20px; background: rgba(255,255,255,0.1); border-radius: 12px; border: none; cursor: pointer;">
                            <span style="font-size: 1.5rem;">✅</span>
                            <span style="font-size:0.8rem; font-weight:bold; margin-top:5px; color:white;">Fácil (⬆)</span>
                        </button>
                    </div>
                </div>`;
            
            document.getElementById('fc-exp').innerHTML = expOriginal + botoesAvaliacao;
            document.getElementById('fc-counter').innerText = `${currentFCIdx + 1} / ${questions.length}`;
            
            checkFCEnd();
        };

        if (wasFlipped) {
            setTimeout(atualizarConteudo, 300);
        } else {
            atualizarConteudo();
        }
    }

    function avaliarFC(isHard) {
        const currentQ = questions[currentFCIdx];
        if (isHard && !difficultFC.includes(currentQ)) {
            difficultFC.push(currentQ);
        }
        nextFC();
    }

    function checkFCEnd() {
        let btnRev = document.getElementById('btn-revisar-fc');
        if (currentFCIdx === questions.length - 1 && difficultFC.length > 0) {
            if (!btnRev) {
                btnRev = document.createElement('button');
                btnRev.id = 'btn-revisar-fc';
                btnRev.className = 'action-btn btn-revisar';
                btnRev.innerText = `🔄 REVISAR DIFÍCEIS (${difficultFC.length})`;
                btnRev.onclick = () => {
                    questions = [...difficultFC];
                    difficultFC = [];
                    currentFCIdx = 0;
                    btnRev.style.display = 'none';
                    renderFC();
                };
                document.querySelector('.nav-controls').after(btnRev);
            }
            btnRev.style.display = 'block';
            btnRev.innerText = `🔄 REVISAR DIFÍCEIS (${difficultFC.length})`;
        } else if (btnRev) {
            btnRev.style.display = 'none';
        }
    }

    function nextFC() {
        if (currentFCIdx < questions.length - 1) {
            currentFCIdx++;
            renderFC();
        }
    }

    function prevFC() {
        if (currentFCIdx > 0) {
            currentFCIdx--;
            renderFC();
        }
    }

    document.addEventListener('keydown', function(e) {
        const fcArea = document.getElementById('flashcard-area');
        if (fcArea && fcArea.style.display === 'flex') {
            const isFlipped = document.getElementById('flash-card-element').classList.contains('is-flipped');
            
            switch(e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    prevFC();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    nextFC();
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    if(isFlipped) avaliarFC(false); 
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if(isFlipped) avaliarFC(true); 
                    break;
                case ' ':
                case 'Spacebar':
                    e.preventDefault();
                    let btnRev = document.getElementById('btn-revisar-fc');
                    if (btnRev && btnRev.style.display === 'block') {
                        btnRev.click();
                    } else if (!isFlipped) {
                        document.getElementById('flash-card-element').classList.add('is-flipped');
                    }
                    break;
            }
        }
    });
</script>
</body>
</html>

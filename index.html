<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eduardo Goulart - Quiz Master PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --primary: #5487e3; --accent: #f1c40f; --danger: #ff6b6b;
            --success: #2ecc71; --joker: #9b59b6; --text: #333; --card-bg: white; --border: #ccc;
        }
        body.dark-mode { --bg: #121212; --text: #f0f0f0; --card-bg: #1e1e1e; --border: #333; }
        html, body { overscroll-behavior-y: none; height: 100vh; margin: 0; padding: 0; overflow: hidden; } 
        body { font-family: 'Arial Rounded MT Bold', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; transition: 0.3s; }

        /* --- MENU INICIAL ORIGINAL --- */
        #setup-menu { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin: 20px; border-top: 10px solid var(--primary); width: 90%; max-width: 600px; text-align: center; overflow-y: auto; max-height: 90vh; }
        .input-group { margin: 12px 0; display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; position: relative; }
        label { font-weight: bold; font-size: 0.9rem; }
        input[type="number"], input[type="range"], select, textarea, input[type="text"], input[type="password"] { width: 100%; max-width: 350px; padding: 12px; border-radius: 8px; border: 2px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 18px; text-align: center; }
        .btn-aux { position: absolute; right: 10px; top: 35px; background: var(--primary); color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; z-index: 5; }

        /* --- GAME AREA --- */
        #game-area { display: none; width: 100vw; height: 100vh; flex-direction: column; padding: 10px; box-sizing: border-box; }
        .game-header { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 5px 15px; }
        #score-board { display: flex; gap: 10px; flex-grow: 1; justify-content: center; }
        .team-card { background: var(--card-bg); padding: 8px 20px; border-radius: 15px; border: 5px solid var(--border); min-width: 140px; text-align: center; font-size: 1.6rem; transition: 0.3s; }
        .team-card.active { border-color: var(--accent); background: var(--accent); color: #000; transform: scale(1.05); }

        .top-btns { display: flex; gap: 10px; }
        .icon-btn { font-size: 1.8rem; background: var(--card-bg); border: 2px solid var(--border); border-radius: 12px; cursor: pointer; padding: 5px 15px; }

        /* --- GRID GIGANTE PARA PROJETOR --- */
        #grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; flex-grow: 1; align-content: center; padding: 10px; }
        #grid.tictactoe { grid-template-columns: repeat(3, 1fr) !important; max-width: 80vh; margin: 0 auto; }
        
        .card { aspect-ratio: 1/1; background: var(--primary); color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 6rem; cursor: pointer; box-shadow: 0 10px 0 #3d6dbd; font-weight: 900; border: 4px solid rgba(255,255,255,0.1); transition: 0.1s; }
        .card.used-correct { background: var(--card-bg) !important; color: var(--success) !important; border: 10px solid var(--success) !important; box-shadow: none; }
        .card.used-wrong { background: var(--danger) !important; color: white !important; box-shadow: none; font-size: 5rem; }

        /* --- MODAL --- */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        #modal { background: var(--card-bg); padding: 35px; border-radius: 30px; width: 95%; max-width: 1100px; text-align: center; max-height: 95vh; overflow-y: auto; position: relative; }
        #modal h2 { font-size: 2.8rem; line-height: 1.2; margin-bottom: 20px; }
        
        /* BOTÕES DE OPÇÕES COM CORES FIXAS AO CLICAR */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .opt-btn { padding: 25px; border: 4px solid var(--primary); border-radius: 15px; font-size: 2rem; font-weight: bold; cursor: pointer; background: var(--card-bg); color: var(--text); transition: 0.2s; }
        
        /* Forçar cores mesmo quando disabled */
        .opt-btn.correct-ans { background-color: var(--success) !important; color: white !important; border-color: #1e8449 !important; }
        .opt-btn.wrong-ans { background-color: var(--danger) !important; color: white !important; border-color: #c0392b !important; }

        /* --- RELATÓRIO E PODIUM --- */
        .podium-container { display: flex; align-items: flex-end; justify-content: center; gap: 15px; margin: 20px 0; height: 180px; }
        .podium-step { width: 120px; text-align: center; border-radius: 15px 15px 0 0; font-weight: bold; position: relative; padding-top: 10px; box-shadow: 0 -4px 15px rgba(0,0,0,0.2); }
        .podium-1 { height: 100%; background: #f1c40f; font-size: 1.3rem; } 
        .podium-2 { height: 75%; background: #bdc3c7; font-size: 1.1rem; } 
        .podium-3 { height: 55%; background: #cd7f32; color: white; font-size: 1rem; }
        
        .report-container { max-height: 250px; overflow-y: auto; text-align: left; background: var(--bg); padding: 15px; border-radius: 12px; border: 2px solid var(--border); margin-top: 20px; }
        .report-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #ccc; font-size: 1rem; }
        .badge-correct { background: var(--success); color: white; padding: 3px 8px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; }
        .badge-wrong { background: var(--danger); color: white; padding: 3px 8px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; }
        
        .action-btn { padding: 20px; border-radius: 15px; border: none; font-size: 1.8rem; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .modal-gif { max-width: 100%; max-height: 220px; border-radius: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: var(--primary); margin: 0; font-size: 2.2rem;">🎮 Quiz Master PRO</h1>
    <p>Eduardo Goulart - Projetor Mode</p>

    <div class="input-group" style="background: rgba(155, 89, 182, 0.1); padding: 15px; border-radius: 12px; border: 2px dashed var(--joker);">
        <input type="text" id="themeInput" placeholder="Tema (Ex: Crase)">
        <input type="number" id="qtdInput" value="15">
        <select id="modelSel">
            <option value="openrouter/free">Auto IA 100% Grátis</option>
            <option value="google/gemini-2.5-flash">Gemini 2.5 Flash</option>
        </select>
        <input type="password" id="apiKeyInput" placeholder="Sua Chave API">
        <button onclick="generateWithAPI()" id="btn-gerar-ia" style="background:var(--joker); color:white; padding:12px; border:none; border-radius:8px; width:100%; cursor:pointer; font-weight:bold; margin-top:10px;">⚡ GERAR QUESTÕES</button>
    </div>

    <div class="input-group">
        <label>Colar JSON:</label>
        <button class="btn-aux" onclick="pasteJSON()">📋 Colar</button>
        <textarea id="jsonInput" style="height: 60px;"></textarea>
    </div>

    <div class="input-group">
        <label>Nomes das Equipes:</label>
        <textarea id="teamNamesInput" placeholder="Equipe 1, Equipe 2" style="height: 45px;"></textarea>
    </div>

    <div class="input-group">
        <select id="gameModeSel">
            <option value="classic">Modo Padrão</option>
            <option value="tictactoe">Jogo da Velha</option>
        </select>
    </div>

    <div style="display: flex; gap: 20px; justify-content: center; margin: 10px 0;">
        <label><input type="checkbox" id="reboundCb" checked> 🏀 Rebote</label>
        <label><input type="checkbox" id="gifsCb" checked> 🎬 GIFs</label>
    </div>

    <button class="action-btn" onclick="startGame()" style="background:var(--success); color:white;">INICIAR JOGO</button>
</div>

<div id="game-area">
    <div class="game-header">
        <div id="score-board"></div>
        <div class="top-btns">
            <button class="icon-btn" onclick="toggleFullScreen()" title="Tela Cheia">📺</button>
            <button class="icon-btn" onclick="document.body.classList.toggle('dark-mode')">🌙</button>
            <button class="icon-btn" onclick="location.reload()" style="color:var(--danger)">✖</button>
        </div>
    </div>
    <div id="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <div id="modal-content"></div>
        <div id="exp-box" style="display:none; padding:15px; background:#e8f4fd; border-radius:10px; margin-top:15px; font-size:1.5rem; text-align:left;"></div>
        <div id="modal-actions" style="margin-top:20px;">
            <button id="btn-continue" class="action-btn" style="display:none; background:var(--primary); color:white;" onclick="closeModal()">PRÓXIMA PERGUNTA</button>
        </div>
    </div>
</div>

<script>
    let questions = [], teams = [], currentTeamIdx = 0, cardStates = {}, gameMode = 'classic', originalTurnIdx = 0, tttBoard = Array(9).fill(null), quizReport = [];
    const gifList = Array.from({length: 38}, (_, i) => `gif/${i+1}.gif`);

    function toggleFullScreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    async function pasteJSON() { document.getElementById('jsonInput').value = await navigator.clipboard.readText(); }

    async function generateWithAPI() {
        const btn = document.getElementById('btn-gerar-ia'); btn.innerText = "⏳ GERANDO..."; btn.disabled = true;
        try {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${document.getElementById('apiKeyInput').value}` },
                body: JSON.stringify({ model: document.getElementById('modelSel').value, messages: [{role: "user", content: `Gere ${document.getElementById('qtdInput').value} questões sobre ${document.getElementById('themeInput').value} em JSON: [{"q":"?","a":"","b":"","c":"","d":"","correct":"A","pts":10,"exp":""}]`}] })
            });
            const data = await res.json();
            document.getElementById('jsonInput').value = data.choices[0].message.content.replace(/```json|```/g, "").trim();
            alert("✅ Sucesso!");
        } catch (e) { alert("Erro na API"); }
        btn.innerText = "⚡ GERAR QUESTÕES"; btn.disabled = false;
    }

    function startGame() {
        try { questions = JSON.parse(document.getElementById('jsonInput').value); } catch(e) { return alert("JSON inválido!"); }
        gameMode = document.getElementById('gameModeSel').value;
        let names = document.getElementById('teamNamesInput').value.split(',').map(n => n.trim()).filter(n => n);
        if(names.length === 0) names = ["Grupo 1", "Grupo 2"];
        teams = names.map(name => ({ name, score: 0 }));
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
        renderBoard();
    }

    function renderBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        grid.className = (gameMode === 'tictactoe') ? 'tictactoe' : '';
        const total = gameMode === 'tictactoe' ? 9 : questions.length;
        for(let i=0; i<total; i++) {
            const card = document.createElement('div');
            const st = cardStates[i];
            card.className = 'card' + (st ? (st.correct ? ' used-correct' : ' used-wrong') : '');
            card.innerHTML = st ? (st.mark || '') : (i + 1);
            card.onclick = () => { if(!cardStates[i]) { originalTurnIdx = currentTeamIdx; showQuestion(i); } };
            grid.appendChild(card);
        }
        renderScores();
    }

    function renderScores() {
        document.getElementById('score-board').innerHTML = teams.map((t, i) => 
            `<div class="team-card ${i===currentTeamIdx?'active':''}"><b>${t.name}</b><br>${t.score} pts</div>`
        ).join('');
    }

    function showQuestion(idx) {
        const q = questions[idx % questions.length];
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'none';
        document.getElementById('exp-box').style.display = 'none';
        let gifHTML = document.getElementById('gifsCb').checked ? `<img src="${gifList[Math.floor(Math.random()*gifList.length)]}" class="modal-gif">` : '';
        document.getElementById('modal-content').innerHTML = `${gifHTML}<h2>${q.q}</h2><div class="options-grid">
            <button class="opt-btn" onclick="checkAns(this, 'A', '${q.correct}', ${idx})">A: ${q.a}</button>
            <button class="opt-btn" onclick="checkAns(this, 'B', '${q.correct}', ${idx})">B: ${q.b}</button>
            ${q.c ? `<button class="opt-btn" onclick="checkAns(this, 'C', '${q.correct}', ${idx})">C: ${q.c}</button><button class="opt-btn" onclick="checkAns(this, 'D', '${q.correct}', ${idx})">D: ${q.d}</button>` : ''}
        </div><p style="font-size:1.5rem">Vez de: <b>${teams[currentTeamIdx].name}</b></p>`;
    }

    function checkAns(btn, chosen, correct, idx) {
        const isCorrect = chosen === correct.trim();
        const allBtns = document.querySelectorAll('.opt-btn');
        
        // Bloqueia todos os botões
        allBtns.forEach(b => b.disabled = true);

        if(isCorrect) {
            btn.classList.add('correct-ans');
            teams[currentTeamIdx].score += 10;
            cardStates[idx] = { correct: true, mark: gameMode==='tictactoe'?(currentTeamIdx===0?'X':'O'):'✅' };
            if(gameMode==='tictactoe') tttBoard[idx] = currentTeamIdx;
            confetti({ particleCount: 150, spread: 70 });
        } else {
            btn.classList.add('wrong-ans');
            cardStates[idx] = { correct: false, mark: '❌' };
        }

        quizReport.push({ team: teams[currentTeamIdx].name, question: questions[idx % questions.length].q, isCorrect, exp: questions[idx % questions.length].exp });
        
        document.getElementById('exp-box').innerHTML = `<b>Resposta: ${correct}</b><br>${questions[idx % questions.length].exp}`;
        document.getElementById('exp-box').style.display = 'block';
        document.getElementById('btn-continue').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        if(gameMode === 'tictactoe' && checkWin()) return showFinal();
        currentTeamIdx = (originalTurnIdx + 1) % teams.length;
        renderBoard();
        if(Object.keys(cardStates).length === (gameMode==='tictactoe'?9:questions.length)) showFinal();
    }

    function checkWin() {
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        return wins.some(w => tttBoard[w[0]]!==null && tttBoard[w[0]]===tttBoard[w[1]] && tttBoard[w[0]]===tttBoard[w[2]]);
    }

    function showFinal() {
        const sorted = [...teams].sort((a,b) => b.score - a.score);
        let podiumHTML = `<div class="podium-container">
            <div class="podium-step podium-2">${sorted[1]?.name || '-'}<br>${sorted[1]?.score || 0} pts</div>
            <div class="podium-step podium-1">${sorted[0]?.name || '-'}<br>${sorted[0]?.score || 0} pts</div>
            <div class="podium-step podium-3">${sorted[2]?.name || '-'}<br>${sorted[2]?.score || 0} pts</div>
        </div>`;
        let reportHTML = `<div class="report-container">` + quizReport.map(r => `<div class="report-item"><b>${r.team}</b>: ${r.isCorrect ? '<span class="badge-correct">ACERTOU</span>' : '<span class="badge-wrong">ERROU</span>'}<br><small>${r.question}</small></div>`).join('') + `</div>`;
        document.getElementById('modal-content').innerHTML = `<h1>🏆 RESULTADO 🏆</h1>${podiumHTML}${reportHTML}<button class="action-btn" onclick="location.reload()" style="background:var(--danger); color:white; margin-top:20px;">REINICIAR</button>`;
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'none';
    }
</script>
</body>
</html>

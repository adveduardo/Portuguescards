<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Master - Eduardo Goulart</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --primary: #5487e3;
            --accent: #f1c40f;
            --danger: #ff6b6b;
            --success: #2ecc71;
            --joker: #9b59b6;
        }

        body { font-family: 'Arial Rounded MT Bold', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        #setup-menu { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; border-top: 10px solid var(--primary); width: 90%; max-width: 600px; }
        .input-group { margin: 15px 0; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        input[type="number"], input[type="range"] { width: 100%; max-width: 250px; padding: 12px; border-radius: 8px; border: 1px solid #ccc; text-align: center; font-size: 18px; }
        
        .csv-info { background: #fff9db; border: 2px dashed #f1c40f; padding: 15px; border-radius: 10px; text-align: left; font-size: 0.85rem; margin-bottom: 15px; color: #856404; }
        .preset-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 5px; }
        .preset-btn { padding: 8px 12px; font-size: 0.9rem; border: 1px solid var(--primary); background: transparent; color: var(--primary); border-radius: 5px; cursor: pointer; }

        .score-board { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; width: 100%; }
        .team-card { background: white; padding: 8px; border-radius: 12px; border: 4px solid #ddd; min-width: 75px; text-align: center; transition: 0.3s; position: relative; }
        .team-card.active { background: #fffbe6; transform: scale(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 10; }
        .group-name { font-size: 0.65rem; font-weight: bold; color: #333; text-transform: uppercase; }
        .group-score { font-size: 1.3rem; font-weight: bold; color: #000; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1400px; width: 100%; padding: 20px; box-sizing: border-box; }
        .card { aspect-ratio: 4/3; background: var(--primary); color: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: clamp(2.5rem, 6vw, 4rem); cursor: pointer; transition: 0.2s; box-shadow: 0 8px 0 #3d6dbd; font-weight: bold; border: 6px solid transparent; box-sizing: border-box;}
        .card.used { cursor: pointer; transform: none; box-shadow: none; opacity: 0.9; }
        .card.used-correct { background: var(--success); }
        .card.used-wrong { background: var(--danger); }
        .card.used-joker { background: var(--joker); }

        .top-controls { width: 100%; display: flex; justify-content: space-between; align-items: flex-start; padding: 0 20px; margin-bottom: 10px; }
        .controls-wrapper { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .btn-restart { padding: 10px 20px; background: var(--danger); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-fullscreen { padding: 10px; background: #333; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
        .global-stats { background: white; padding: 6px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; color: #555; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index:100; justify-content: center; align-items: center; }
        #modal { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 650px; text-align: center; position: relative; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .opt-btn { padding: 20px; border: 3px solid var(--primary); border-radius: 15px; cursor: pointer; background: white; font-weight: bold; font-size: 1.2rem; }
        .opt-btn.correct { background: var(--success) !important; color: white; border-color: #27ae60; }
        .opt-btn.wrong { background: var(--danger) !important; color: white; border-color: #c0392b; }
        
        .btn-continue { margin-top: 20px; padding: 18px 25px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.2rem; width: 100%; display: none; box-shadow: 0 5px 0 #3d6dbd; }
        
        /* Cronômetro */
        #timer-display { font-size: 2.5rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .timer-warning { color: var(--danger) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Botões Iniciais */
        .action-btn { padding: 15px 40px; border: none; border-radius: 12px; cursor: pointer; background: var(--primary); color: white; font-weight: bold; font-size: 1.3rem; margin: 5px; }
        .resume-btn { background: var(--success); display: none; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: var(--primary); margin: 0;">🎮 Português</h1>
    <p style="margin: 5px 0 20px 0;">Professor Eduardo Goulart</p>
    
    <button id="resume-btn" class="action-btn resume-btn" onclick="resumeGame()">▶ CONTINUAR JOGO SALVO</button>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div class="input-group">
        <label>Grupos (1-30):</label>
        <input type="number" id="teamCount" value="2" min="1" max="30">
    </div>

    <div class="input-group">
        <label>Cartões:</label>
        <input type="number" id="cardCount" value="16" min="1" max="100">
        <div class="preset-btns">
            <button class="preset-btn" onclick="setCards(16)">16</button>
            <button class="preset-btn" onclick="setCards(25)">25</button>
            <button class="preset-btn" onclick="setCards(36)">36</button>
        </div>
    </div>

    <div class="input-group">
        <label>Tempo por questão (0 = Sem tempo):</label>
        <input type="number" id="timerConfig" value="30" min="0" max="120">
    </div>

    <div class="input-group">
        <label>Probabilidade de Coringa: <b id="jokerVal">10%</b></label>
        <input type="range" id="jokerProb" min="0" max="50" value="10" oninput="document.getElementById('jokerVal').innerText = this.value + '%'">
    </div>

    <div class="input-group">
        <label>Arquivo CSV:</label>
        <input type="file" id="csvFile" accept=".csv">
    </div>

    <button class="action-btn" onclick="startGame(false)">INICIAR NOVO JOGO</button>
</div>

<div id="game-area" style="display:none; width: 100%;">
    <div class="top-controls">
        <button class="btn-fullscreen" onclick="toggleFullScreen()">⛶</button>
        <div class="controls-wrapper">
            <button class="btn-restart" onclick="confirmRestart()">REINICIAR</button>
            <div class="global-stats">
                GERAL: <span style="color:var(--success)" id="g-correct">0 Certas</span> | 
                <span style="color:var(--danger)" id="g-wrong">0 Erradas</span>
            </div>
        </div>
    </div>
    <div class="score-board" id="score-board"></div>
    <div class="grid" id="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <div id="modal-content"></div>
        <button id="btn-continue" class="btn-continue" onclick="closeModal()">FECHAR</button>
    </div>
</div>

<script>
    // Sintetizador de Áudio (Bipes nativos)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration, vol=0.1, startTime=0) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime + startTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + startTime);
        osc.stop(audioCtx.currentTime + startTime + duration);
    }
    const sounds = {
        correct: () => { playTone(600, 'sine', 0.2); playTone(800, 'sine', 0.4, 0.1, 0.1); },
        wrong: () => { playTone(300, 'sawtooth', 0.4); playTone(250, 'sawtooth', 0.4, 0.1, 0.2); },
        joker: () => { playTone(400, 'square', 0.1); playTone(500, 'square', 0.1, 0.1, 0.1); playTone(600, 'square', 0.1, 0.1, 0.2); playTone(800, 'square', 0.4, 0.1, 0.3); },
        tick: () => { playTone(800, 'sine', 0.05, 0.02); },
        buzz: () => { playTone(200, 'sawtooth', 0.8, 0.1); }
    };

    // Variáveis Globais
    let questions = [];
    let teams = [];
    let currentTeamIdx = 0;
    let jokerChance = 10;
    let cardStates = {}; 
    let globalCorrect = 0;
    let globalWrong = 0;
    let isViewingUsedCard = false;
    let nCardsGlob = 16;
    let timerValue = 0;
    let currentInterval;

    // Verificar se existe jogo salvo
    if(localStorage.getItem('quizData_Eduardo')) {
        document.getElementById('resume-btn').style.display = 'inline-block';
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen(); }
            else if (document.documentElement.webkitRequestFullscreen) { document.documentElement.webkitRequestFullscreen(); } /* Safari */
        } else {
            if (document.exitFullscreen) { document.exitFullscreen(); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
        }
    }

    function setCards(n) { document.getElementById('cardCount').value = n; }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            questions = event.target.result.split('\n').filter(l => l.trim() !== '').map(l => l.split(','));
        };
        reader.readAsText(e.target.files[0]);
    });

    function saveGame() {
        const data = { questions, teams, currentTeamIdx, cardStates, globalCorrect, globalWrong, nCardsGlob, timerValue };
        localStorage.setItem('quizData_Eduardo', JSON.stringify(data));
    }

    function resumeGame() {
        const data = JSON.parse(localStorage.getItem('quizData_Eduardo'));
        questions = data.questions; teams = data.teams; currentTeamIdx = data.currentTeamIdx;
        cardStates = data.cardStates; globalCorrect = data.globalCorrect; globalWrong = data.globalWrong;
        nCardsGlob = data.nCardsGlob; timerValue = data.timerValue;
        startGame(true);
    }

    function confirmRestart() {
        if(confirm("Deseja realmente sair e apagar o jogo salvo?")) {
            localStorage.removeItem('quizData_Eduardo');
            location.reload();
        }
    }

    function startGame(isResume) {
        if(!isResume) {
            const nTeams = parseInt(document.getElementById('teamCount').value);
            nCardsGlob = parseInt(document.getElementById('cardCount').value);
            jokerChance = parseInt(document.getElementById('jokerProb').value);
            timerValue = parseInt(document.getElementById('timerConfig').value);

            if (questions.length === 0) {
                for(let i=0; i<nCardsGlob; i++) questions.push([`Questão de Exemplo ${i+1}`, "A", "B", "C", "D", "A", "10"]);
            }

            teams = Array.from({length: Math.min(nTeams, 30)}, (_, i) => ({ 
                name: `G${i+1}`, score: 0, color: `hsl(${Math.floor((i * 360) / Math.min(nTeams, 30))}, 80%, 45%)`
            }));
            cardStates = {}; globalCorrect = 0; globalWrong = 0; currentTeamIdx = 0;
        }

        renderScores();
        document.getElementById('g-correct').innerText = `${globalCorrect} Certas`;
        document.getElementById('g-wrong').innerText = `${globalWrong} Erradas`;

        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < nCardsGlob; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = i + 1;
            card.id = `card-${i}`;
            
            if(cardStates[i]) {
                card.classList.add('used');
                card.style.borderColor = cardStates[i].color;
                if(cardStates[i].type === 'joker') card.classList.add('used-joker');
                else if(cardStates[i].correct) card.classList.add('used-correct');
                else card.classList.add('used-wrong');
            }
            card.onclick = () => handleCardClick(i, card);
            grid.appendChild(card);
        }
        
        saveGame();
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
    }

    function renderScores() {
        const board = document.getElementById('score-board');
        board.innerHTML = '';
        teams.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = `team-card ${i === currentTeamIdx ? 'active' : ''}`;
            div.style.borderColor = t.color;
            div.innerHTML = `<div class="group-name">${t.name}</div><div class="group-score">${t.score}</div>`;
            board.appendChild(div);
        });
    }

    function startTimerDisplay() {
        if(timerValue <= 0) return '';
        return `<div id="timer-display">${timerValue}</div>`;
    }

    function runTimer() {
        if(timerValue <= 0) return;
        let timeLeft = timerValue;
        const display = document.getElementById('timer-display');
        clearInterval(currentInterval);
        
        currentInterval = setInterval(() => {
            timeLeft--;
            if(display) {
                display.innerText = timeLeft;
                if(timeLeft <= 10 && timeLeft > 0) {
                    display.classList.add('timer-warning');
                    sounds.tick();
                }
                if(timeLeft <= 0) {
                    clearInterval(currentInterval);
                    sounds.buzz();
                    display.innerText = "TEMPO ESGOTADO!";
                }
            }
        }, 1000);
    }

    function handleCardClick(idx, card) {
        const modal = document.getElementById('modal-content');
        const closeBtn = document.getElementById('btn-continue');
        document.getElementById('modal-overlay').style.display = 'flex';
        closeBtn.style.display = 'none';
        clearInterval(currentInterval);
        
        if (card.classList.contains('used')) {
            isViewingUsedCard = true;
            const state = cardStates[idx];
            closeBtn.style.display = 'block';
            if (state.type === 'joker') {
                modal.innerHTML = `<div class="joker-title">🃏 REABERTO</div><p>Coringa de ${state.val} pontos para o <b style="color:${state.color}">${state.team}</b>.</p>`;
            } else {
                renderQuestion(idx, true, card);
            }
            return;
        }

        isViewingUsedCard = false;
        const isJoker = Math.random() * 100 < jokerChance;

        if (isJoker) {
            sounds.joker();
            const bonus = [5, 10, 15][Math.floor(Math.random() * 3)];
            cardStates[idx] = { type: 'joker', val: bonus, team: teams[currentTeamIdx].name, color: teams[currentTeamIdx].color };
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            modal.innerHTML = `<div class="joker-title">🃏 CORINGA!</div><p style="font-size: 1.5rem">O <b style="color:${teams[currentTeamIdx].color}">${teams[currentTeamIdx].name}</b> ganhou <b>${bonus} pontos</b>!</p>`;
            teams[currentTeamIdx].score += bonus;
            card.classList.add('used', 'used-joker');
            card.style.borderColor = teams[currentTeamIdx].color;
            renderScores();
            saveGame();
            closeBtn.style.display = 'block';
        } else {
            cardStates[idx] = { type: 'question', team: teams[currentTeamIdx].name, color: teams[currentTeamIdx].color, correct: false };
            renderQuestion(idx, false, card);
            runTimer();
        }
    }

    function renderQuestion(idx, frozen, cardElement) {
        const q = questions[idx % questions.length];
        const modal = document.getElementById('modal-content');
        const closeBtn = document.getElementById('btn-continue');
        const stateColor = cardStates[idx].color;
        const stateTeam = cardStates[idx].team;

        modal.innerHTML = `
            <div style="font-weight:bold; color: var(--accent); font-size: 1.2rem;">${q[6] || 10} PONTOS</div>
            ${frozen ? '' : startTimerDisplay()}
            <h2 style="margin: 15px 0;">${q[0]}</h2>
            <div class="options-grid" id="m-options"></div>
            <div style="font-size: 1.1rem; border-top: 1px solid #eee; padding-top: 10px;">Vez do: <b style="color:${stateColor}">${stateTeam}</b></div>
        `;
        const optsContainer = document.getElementById('m-options');
        ['A','B','C','D'].forEach((l, i) => {
            const txt = q[i+1] ? q[i+1].trim() : "";
            if (txt && txt !== "") {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = `${l}: ${txt}`;
                if (frozen) {
                    btn.style.pointerEvents = 'none';
                    if (l === q[5].trim()) btn.classList.add('correct');
                } else {
                    btn.onclick = () => {
                        clearInterval(currentInterval); // Para o tempo
                        const btns = document.querySelectorAll('.opt-btn');
                        btns.forEach(b => b.style.pointerEvents = 'none');
                        const isCorrect = (l === q[5].trim());
                        
                        cardStates[idx].correct = isCorrect;

                        if (isCorrect) {
                            sounds.correct();
                            btn.classList.add('correct');
                            teams[currentTeamIdx].score += parseInt(q[6]||10);
                            cardElement.classList.add('used', 'used-correct');
                            globalCorrect++;
                        } else {
                            sounds.wrong();
                            btn.classList.add('wrong');
                            btns.forEach(b => { if(b.innerText.startsWith(q[5].trim())) b.classList.add('correct'); });
                            cardElement.classList.add('used', 'used-wrong');
                            globalWrong++;
                        }
                        document.getElementById('g-correct').innerText = `${globalCorrect} Certas`;
                        document.getElementById('g-wrong').innerText = `${globalWrong} Erradas`;
                        cardElement.style.borderColor = teams[currentTeamIdx].color;
                        renderScores();
                        saveGame();
                        closeBtn.style.display = 'block';
                    };
                }
                optsContainer.appendChild(btn);
            }
        });
    }

    function closeModal() {
        clearInterval(currentInterval);
        document.getElementById('modal-overlay').style.display = 'none';
        if (!isViewingUsedCard) {
            currentTeamIdx = (currentTeamIdx + 1) % teams.length;
        }
        renderScores();
        saveGame();
    }
</script>
</body>
</html>

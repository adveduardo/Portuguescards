
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Master Pro - Eduardo Goulart</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --primary: #5487e3; --accent: #f1c40f; --danger: #ff6b6b;
            --success: #2ecc71; --joker: #9b59b6; --text: #333; --card-bg: white; --border: #ccc;
        }
        body.dark-mode { --bg: #121212; --text: #f0f0f0; --card-bg: #1e1e1e; --border: #333; }
        html, body { overscroll-behavior-y: none; } 
        body { font-family: 'Arial Rounded MT Bold', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: 0.3s; }

        #setup-menu { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; border-top: 10px solid var(--primary); width: 90%; max-width: 600px; }
        .input-group { margin: 12px 0; display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; position: relative; }
        label { font-weight: bold; font-size: 0.9rem; }
        input[type="number"], input[type="range"], select, textarea { width: 100%; max-width: 350px; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); font-size: 16px; }
        
        .paste-btn { position: absolute; right: 10px; top: 35px; background: var(--primary); color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem; z-index: 5; }
        
        #global-timer-display { background: var(--danger); color: white; padding: 5px 15px; border-radius: 20px; font-size: 1.2rem; font-weight: bold; min-width: 100px; }

        input:disabled, select:disabled, .disabled-label { opacity: 0.4; cursor: not-allowed; background: #e9ecef !important; color: #888 !important; }
        .config-box { background: var(--bg); padding: 12px; border-radius: 10px; border: 1px solid var(--border); width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 8px; text-align: left; margin: 10px auto; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; padding: 20px; }
        .grid.tictactoe { grid-template-columns: repeat(3, 1fr) !important; max-width: 600px; }
        .card { aspect-ratio: 4/3; background: var(--primary); color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 0 #3d6dbd; font-weight: bold; border: 4px solid transparent; }
        .card.used { opacity: 0.8; box-shadow: none; }
        .card.used-correct { background: var(--card-bg) !important; color: var(--text) !important; border: 4px solid var(--success) !important; }
        .card.used-wrong { background: var(--danger) !important; color: white !important; }
        .card.golden { background: linear-gradient(45deg, #ffd700, #f1c40f) !important; color: #333 !important; border: 4px solid #fff; box-shadow: 0 0 15px #ffd700; }

        .top-controls { width: 100%; display: flex; justify-content: space-between; padding: 10px 20px; align-items: center; }
        .score-board { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; width: 100%; flex-wrap: wrap; }
        .team-card { background: var(--card-bg); padding: 10px; border-radius: 10px; border: 3px solid var(--border); min-width: 90px; text-align: center; }
        .team-card.active { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        #modal { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 100%; max-width: 600px; text-align: center; max-height: 85vh; overflow-y: auto; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .opt-btn { padding: 15px; border: 2px solid var(--primary); border-radius: 10px; background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: bold; }
        .opt-btn.correct { background-color: var(--success) !important; color: white !important; }
        .opt-btn.wrong { background-color: var(--danger) !important; color: white !important; }

        .action-btn { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div id="setup-menu">
    <h1 style="color: var(--primary); margin: 0;">🎮 Português Pro 🇧🇷</h1>
    <p style="margin: 5px 0 15px 0; font-weight: bold;">Prof: Eduardo Goulart</p>

    <div class="input-group">
        <label>Colar JSON:</label>
        <button class="paste-btn" onclick="pasteJSON()">📋 Colar</button>
        <textarea id="jsonInput" oninput="checkJSONAuto()" placeholder="Ao colar, cartões e grupos serão automáticos..." style="height: 50px; padding-right: 70px;"></textarea>
    </div>

    <div class="input-group">
        <label>Nomes dos Grupos (vírgula):</label>
        <textarea id="groupNames" placeholder="Ex: Feras, Elite..." style="height: 40px;"></textarea>
    </div>

    <div class="input-group">
        <label>Tempo da Aula (Minutos):</label>
        <input type="number" id="globalTimeLimit" value="30" min="1" max="120">
    </div>

    <div class="input-group">
        <label>Modo de Jogo:</label>
        <select id="gameModeSel" onchange="handleModeChange()">
            <option value="classic">Modo Padrão</option>
            <option value="tictactoe">Jogo da Velha (3x3)</option>
        </select>
    </div>

    <div class="input-group">
        <label id="lblTeam">Grupos:</label>
        <input type="number" id="teamCount" value="2" min="1" max="10">
    </div>

    <div class="input-group">
        <label id="lblCard">Total de Cartões:</label>
        <input type="number" id="cardCount" value="15" min="1" max="100">
    </div>

    <div class="input-group">
        <label id="lblSurprise">Probabilidade Surpresa (Bomba/Roubo/Dourada): <b id="jokerVal">10%</b></label>
        <input type="range" id="jokerProb" min="0" max="50" value="10" oninput="document.getElementById('jokerVal').innerText = this.value + '%'">
    </div>

    <div class="config-box">
        <label id="reboundLabel" class="checkbox-row"><input type="checkbox" id="reboundCb" checked> 🏀 Rebote</label>
    </div>

    <button class="action-btn" onclick="startGame()" style="width:100%; background:var(--success); color:white; font-size:1.2rem; margin-top: 10px;">INICIAR QUIZ</button>
</div>

<div id="game-area" style="display:none; width: 100%;">
    <div class="top-controls">
        <button onclick="toggleDarkMode()">🌙</button>
        <div id="global-timer-display">30:00</div>
        <button onclick="location.reload()" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:8px;">SAIR</button>
    </div>
    <div id="score-board" class="score-board"></div>
    <div id="grid" class="grid"></div>
</div>

<div id="modal-overlay">
    <div id="modal">
        <div id="modal-content"></div>
        <button id="btn-continue" class="action-btn" style="display:none; width:100%; background:var(--primary); color:white; margin-top:15px;" onclick="closeModal()">CONCLUIR RODADA</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let musicNodes = [], isMusicMuted = false, globalTimerInterval, totalSecondsLeft;
    let questions = [], teams = [], currentTeamIdx = 0, cardStates = {}, nCardsGlob = 15;
    let gameMode = 'classic', isReboundActive = false, surpriseProb = 10, tttBoard = Array(9).fill(null);

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    
    function checkJSONAuto() {
        const hasJSON = document.getElementById('jsonInput').value.trim() !== "";
        const isTTT = document.getElementById('gameModeSel').value === 'tictactoe';
        document.getElementById('teamCount').disabled = hasJSON || isTTT;
        document.getElementById('cardCount').disabled = hasJSON || isTTT;
        document.getElementById('jokerProb').disabled = isTTT;
    }

    async function pasteJSON() { 
        try { 
            const text = await navigator.clipboard.readText(); 
            document.getElementById('jsonInput').value = text; 
            checkJSONAuto();
        } catch (err) { alert('Erro ao colar.'); } 
    }

    function handleModeChange() {
        const isTTT = document.getElementById('gameModeSel').value === 'tictactoe';
        const teamInp = document.getElementById('teamCount');
        const cardInp = document.getElementById('cardCount');
        const surpriseInp = document.getElementById('jokerProb');

        if(isTTT) {
            teamInp.value = 2; teamInp.disabled = true;
            cardInp.value = 9; cardInp.disabled = true;
            surpriseInp.value = 0; surpriseInp.disabled = true;
            document.getElementById('jokerVal').innerText = "0%";
            document.getElementById('reboundCb').checked = false;
        } else {
            teamInp.disabled = false; cardInp.disabled = false; surpriseInp.disabled = false;
        }
    }

    function startGame() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const jsonText = document.getElementById('jsonInput').value;
        gameMode = document.getElementById('gameModeSel').value;
        
        if(jsonText.trim() !== "") {
            try { 
                questions = JSON.parse(jsonText).map(item => [item.q, item.a, item.b, item.c, item.d, item.correct, item.pts || 10]);
                nCardsGlob = gameMode === 'tictactoe' ? 9 : questions.length;
            } catch(e) { alert("Erro no JSON!"); return; }
        } else {
            nCardsGlob = parseInt(document.getElementById('cardCount').value);
            for(let i=0; i<nCardsGlob; i++) questions.push([`Pergunta ${i+1}?`, "A", "B", "C", "D", "A", 10]);
        }

        const nameInput = document.getElementById('groupNames').value.trim();
        let names = nameInput !== "" ? nameInput.split(',').map(n => n.trim()).filter(n => n !== "") : [];
        const nTeamsInp = parseInt(document.getElementById('teamCount').value);
        const finalCount = Math.max(names.length, nTeamsInp);
        
        teams = [];
        for(let i=0; i<finalCount; i++) teams.push({name: names[i] || `Grupo ${i+1}`, score: 0, color: `hsl(${(i*137)%360}, 70%, 50%)`});

        surpriseProb = parseInt(document.getElementById('jokerProb').value);
        totalSecondsLeft = parseInt(document.getElementById('globalTimeLimit').value) * 60;
        startGlobalTimer();
        document.getElementById('setup-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        renderBoard();
    }

    function startGlobalTimer() {
        globalTimerInterval = setInterval(() => {
            totalSecondsLeft--;
            let mins = Math.floor(totalSecondsLeft / 60);
            let secs = totalSecondsLeft % 60;
            document.getElementById('global-timer-display').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if(totalSecondsLeft <= 0) { clearInterval(globalTimerInterval); showFinal(); }
        }, 1000);
    }

    function renderBoard() {
        renderScores();
        const grid = document.getElementById('grid');
        grid.className = 'grid ' + (gameMode === 'tictactoe' ? 'tictactoe' : '');
        grid.innerHTML = '';
        for (let i = 0; i < nCardsGlob; i++) {
            const card = document.createElement('div');
            const state = cardStates[i];
            card.className = 'card' + (state ? ' used ' + (state.correct ? 'used-correct' : 'used-wrong') : '');
            if(state?.isGolden && state.correct) card.classList.add('golden');
            
            card.innerHTML = state ? (state.mark || '') : (i + 1);
            if(state) card.style.borderColor = state.color;
            card.onclick = () => handleCardClick(i, card);
            grid.appendChild(card);
        }
    }

    function renderScores() {
        document.getElementById('score-board').innerHTML = teams.map((t, i) => `
            <div class="team-card ${i === currentTeamIdx ? 'active' : ''}" style="border-color:${t.color}">
                <b>${t.name}</b><br>${t.score}
            </div>
        `).join('');
    }

    function handleCardClick(idx, card) {
        if(cardStates[idx]) return;
        card.style.transform = 'rotateY(90deg)';
        setTimeout(() => { 
            card.style.transform = 'rotateY(0deg)'; 
            
            let isGolden = false;
            if(Math.random() * 100 < surpriseProb) {
                const rand = Math.random() * 100;
                if(rand < 40) { showSurprise('bomb', idx); return; }
                if(rand < 80) { showSurprise('steal', idx); return; }
                isGolden = true; // 20% das cartas surpresas são douradas
            }
            showQuestion(idx, isGolden);
        }, 200);
    }

    function showSurprise(type, idx) {
        const modal = document.getElementById('modal-content');
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'block';
        const team = teams[currentTeamIdx];

        if(type === 'bomb') {
            modal.innerHTML = `<h1>💣 BOMBA!</h1><p>${team.name} perdeu 10 pontos!</p>`;
            team.score -= 10;
            cardStates[idx] = {correct: false, color: team.color, mark: '💣'};
        } else {
            const victim = teams.find((t, i) => i !== currentTeamIdx && t.score > 0);
            if(victim) {
                modal.innerHTML = `<h1>🥷 ROUBO!</h1><p>${team.name} roubou 10 pontos de ${victim.name}!</p>`;
                victim.score -= 10; team.score += 10;
            } else {
                modal.innerHTML = `<h1>🥷 ROUBO!</h1><p>Mas ninguém tem pontos para roubar...</p>`;
            }
            cardStates[idx] = {correct: true, color: team.color, mark: '🥷'};
        }
        renderScores();
    }

    function showQuestion(idx, isGolden) {
        const q = questions[idx % questions.length];
        const modal = document.getElementById('modal-content');
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('btn-continue').style.display = 'none';
        
        const title = isGolden ? "<h2 style='color:#f1c40f'>👑 CARTA DOURADA (PONTOS DOBRADOS)</h2>" : "";
        const isVF = q[2] === "C" || q[2] === "" || !q[2] || q[1].toLowerCase().includes("falso") || q[1].toLowerCase().includes("verdadeiro");

        modal.innerHTML = `${title}<h2>${q[0]}</h2>
            <div class="options-grid">
                <button class="opt-btn" onclick="checkAns(this, 'A', '${q[5]}', ${idx}, ${q[6]}, ${isGolden})">A: ${q[1]}</button>
                <button class="opt-btn" onclick="checkAns(this, 'B', '${q[5]}', ${idx}, ${q[6]}, ${isGolden})">B: ${q[2]}</button>
                ${!isVF ? `<button class="opt-btn" onclick="checkAns(this, 'C', '${q[5]}', ${idx}, ${q[6]}, ${isGolden})">C: ${q[3]}</button>` : ''}
                ${!isVF ? `<button class="opt-btn" onclick="checkAns(this, 'D', '${q[5]}', ${idx}, ${q[6]}, ${isGolden})">D: ${q[4]}</button>` : ''}
            </div>
            <p>Vez de: <b>${teams[currentTeamIdx].name}</b></p>`;
    }

    function checkAns(btn, chosen, correct, idx, pts, isGolden) {
        const isCorrect = chosen === correct.trim();
        const team = teams[currentTeamIdx];
        const allBtns = document.querySelectorAll('.opt-btn');
        allBtns.forEach(b => b.disabled = true);

        if(isCorrect) {
            btn.classList.add('correct'); 
            team.score += isGolden ? pts * 2 : pts;
            cardStates[idx] = {correct: true, color: team.color, mark: gameMode === 'tictactoe' ? (currentTeamIdx === 0 ? 'X' : 'O') : '✅', isGolden: isGolden};
            if(gameMode === 'tictactoe') tttBoard[idx] = currentTeamIdx;
            isReboundActive = false; document.getElementById('btn-continue').style.display = 'block';
        } else {
            btn.classList.add('wrong');
            if(document.getElementById('reboundCb').checked && !isReboundActive) {
                isReboundActive = true; currentTeamIdx = (currentTeamIdx + 1) % teams.length;
                renderScores(); setTimeout(() => { allBtns.forEach(b => { if(!b.classList.contains('wrong')) b.disabled = false; }); alert("🏀 REBOTE!"); }, 500);
            } else {
                // NO JOGO DA VELHA, NÃO MARCA O CARD SE ERRAR
                if(gameMode !== 'tictactoe') {
                    cardStates[idx] = {correct: false, color: team.color, mark: '❌'};
                }
                isReboundActive = false; document.getElementById('btn-continue').style.display = 'block';
            }
        }
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        if(gameMode === 'tictactoe') {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let w of wins) if (tttBoard[w[0]] !== null && tttBoard[w[0]] === tttBoard[w[1]] && tttBoard[w[0]] === tttBoard[w[2]]) { showFinal(); return; }
        }
        if(Object.keys(cardStates).length === nCardsGlob) { showFinal(); return; }
        currentTeamIdx = (currentTeamIdx + 1) % teams.length; renderBoard();
    }

    function showFinal() {
        clearInterval(globalTimerInterval);
        const sorted = [...teams].sort((a,b) => b.score - a.score);
        confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
        document.getElementById('modal-content').innerHTML = `<h1>🏆 VENCEDOR: ${sorted[0].name}</h1><button class='action-btn' style='width:100%; margin-top:20px; background:var(--danger);' onclick='location.reload()'>REINICIAR</button>`;
        document.getElementById('modal-overlay').style.display = 'flex';
    }
</script>
</body>
</html>
